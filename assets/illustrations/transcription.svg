<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" width="900" height="450">
  <defs>
    <linearGradient id="dnaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1565C0"/>
      <stop offset="100%" style="stop-color:#42A5F5"/>
    </linearGradient>
    <linearGradient id="rnaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2E7D32"/>
      <stop offset="100%" style="stop-color:#66BB6A"/>
    </linearGradient>
    <linearGradient id="polymeraseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F57C00"/>
      <stop offset="100%" style="stop-color:#FF9800"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5C6BC0"/>
    </marker>
  </defs>
  
  <rect width="100%" height="100%" fill="#FAFAFA" rx="12"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="26" font-weight="700" fill="#1A237E">Transcription: DNA → RNA</text>
  
  <!-- Main Process Flow -->
  <g transform="translate(50, 80)">
    <!-- DNA Template Strand -->
    <g filter="url(#shadow)">
      <rect x="0" y="60" width="800" height="50" rx="8" fill="url(#dnaGrad)"/>
      <text x="400" y="90" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="16" font-weight="600" fill="white">DNA Template Strand (3' → 5')</text>
      <!-- Nucleotides -->
      <g transform="translate(80, 120)">
        <rect x="0" y="0" width="45" height="30" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
        <text x="22" y="20" text-anchor="middle" font-family="'Courier New'" font-size="14" font-weight="600" fill="#1565C0">T</text>
        <rect x="60" y="0" width="45" height="30" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
        <text x="82" y="20" text-anchor="middle" font-family="'Courier New'" font-size="14" font-weight="600" fill="#1565C0">A</text>
        <rect x="120" y="0" width="45" height="30" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
        <text x="142" y="20" text-anchor="middle" font-family="'Courier New'" font-size="14" font-weight="600" fill="#1565C0">C</text>
        <rect x="180" y="0" width="45" height="30" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
        <text x="202" y="20" text-anchor="middle" font-family="'Courier New'" font-size="14" font-weight="600" fill="#1565C0">G</text>
        <rect x="240" y="0" width="45" height="30" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
        <text x="262" y="20" text-anchor="middle" font-family="'Courier New'" font-size="14" font-weight="600" fill="#1565C0">G</text>
        <rect x="300" y="0" width="45" height="30" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
        <text x="322" y="20" text-anchor="middle" font-family="'Courier New'" font-size="14" font-weight="600" fill="#1565C0">A</text>
        <rect x="360" y="0" width="45" height="30" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
        <text x="382" y="20" text-anchor="middle" font-family="'Courier New'" font-size="14" font-weight="600" fill="#1565C0">T</text>
        <rect x="420" y="0" width="45" height="30" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
        <text x="442" y="20" text-anchor="middle" font-family="'Courier New'" font-size="14" font-weight="600" fill="#1565C0">C</text>
      </g>
    </g>
    
    <!-- RNA Polymerase -->
    <g transform="translate(350, 170)" filter="url(#shadow)">
      <ellipse cx="60" cy="40" rx="70" ry="45" fill="url(#polymeraseGrad)"/>
      <text x="60" y="35" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="12" font-weight="600" fill="white">RNA</text>
      <text x="60" y="52" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="12" font-weight="600" fill="white">Polymerase</text>
      <!-- Direction arrow -->
      <path d="M140,40 L170,40" stroke="#F57C00" stroke-width="3" marker-end="url(#arrow)"/>
    </g>
    
    <!-- Nascent mRNA -->
    <g filter="url(#shadow)">
      <rect x="0" y="250" width="600" height="50" rx="8" fill="url(#rnaGrad)"/>
      <text x="300" y="280" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="16" font-weight="600" fill="white">Nascent mRNA (5' → 3')</text>
      <!-- RNA Nucleotides -->
      <g transform="translate(80, 305)">
        <rect x="0" y="0" width="45" height="30" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
        <text x="22" y="20" text-anchor="middle" font-family="'Courier New'" font-size="14" font-weight="600" fill="#2E7D32">A</text>
        <rect x="60" y="0" width="45" height="30" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
        <text x="82" y="20" text-anchor="middle" font-family="'Courier New'" font-size="14" font-weight="600" fill="#2E7D32">U</text>
        <rect x="120" y="0" width="45" height="30" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
        <text x="142" y="20" text-anchor="middle" font-family="'Courier New'" font-size="14" font-weight="600" fill="#2E7D32">G</text>
        <rect x="180" y="0" width="45" height="30" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
        <text x="202" y="20" text-anchor="middle" font-family="'Courier New'" font-size="14" font-weight="600" fill="#2E7D32">C</text>
        <rect x="240" y="0" width="45" height="30" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
        <text x="262" y="20" text-anchor="middle" font-family="'Courier New'" font-size="14" font-weight="600" fill="#2E7D32">C</text>
        <rect x="300" y="0" width="45" height="30" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
        <text x="322" y="20" text-anchor="middle" font-family="'Courier New'" font-size="14" font-weight="600" fill="#2E7D32">U</text>
      </g>
    </g>
    
    <!-- Complementary pairing lines -->
    <line x1="130" y1="150" x2="130" y2="250" stroke="#78909C" stroke-width="2" stroke-dasharray="5,3"/>
    <line x1="190" y1="150" x2="190" y2="250" stroke="#78909C" stroke-width="2" stroke-dasharray="5,3"/>
    <line x1="250" y1="150" x2="250" y2="250" stroke="#78909C" stroke-width="2" stroke-dasharray="5,3"/>
    <line x1="310" y1="150" x2="310" y2="250" stroke="#78909C" stroke-width="2" stroke-dasharray="5,3"/>
    <line x1="370" y1="150" x2="370" y2="250" stroke="#78909C" stroke-width="2" stroke-dasharray="5,3"/>
    <line x1="430" y1="150" x2="430" y2="250" stroke="#78909C" stroke-width="2" stroke-dasharray="5,3"/>
  </g>
  
  <!-- Key Points Panel -->
  <g transform="translate(680, 150)" filter="url(#shadow)">
    <rect width="180" height="240" rx="10" fill="white" stroke="#E0E0E0"/>
    <text x="90" y="30" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="14" font-weight="600" fill="#263238">Key Points</text>
    <line x1="15" y1="45" x2="165" y2="45" stroke="#E0E0E0"/>
    <g transform="translate(20, 65)">
      <circle cx="6" cy="0" r="4" fill="#1565C0"/>
      <text x="18" y="4" font-family="'Segoe UI', Arial" font-size="11" fill="#37474F">Template: 3'→5'</text>
      <circle cx="6" cy="30" r="4" fill="#2E7D32"/>
      <text x="18" y="34" font-family="'Segoe UI', Arial" font-size="11" fill="#37474F">mRNA: 5'→3'</text>
      <circle cx="6" cy="60" r="4" fill="#F57C00"/>
      <text x="18" y="64" font-family="'Segoe UI', Arial" font-size="11" fill="#37474F">RNA Pol II</text>
      <circle cx="6" cy="90" r="4" fill="#E53935"/>
      <text x="18" y="94" font-family="'Segoe UI', Arial" font-size="11" fill="#37474F">T → U (Uracil)</text>
      <circle cx="6" cy="120" r="4" fill="#7B1FA2"/>
      <text x="18" y="124" font-family="'Segoe UI', Arial" font-size="11" fill="#37474F">In nucleus</text>
      <circle cx="6" cy="150" r="4" fill="#00897B"/>
      <text x="18" y="154" font-family="'Segoe UI', Arial" font-size="11" fill="#37474F">NTPs used</text>
    </g>
  </g>
  
  <!-- Legend -->
  <g transform="translate(50, 420)">
    <rect width="800" height="25" rx="5" fill="#ECEFF1"/>
    <rect x="20" y="6" width="12" height="12" rx="2" fill="#1565C0"/>
    <text x="38" y="16" font-family="'Segoe UI', Arial" font-size="10" fill="#37474F">DNA Template</text>
    <rect x="150" y="6" width="12" height="12" rx="2" fill="#2E7D32"/>
    <text x="168" y="16" font-family="'Segoe UI', Arial" font-size="10" fill="#37474F">mRNA Transcript</text>
    <rect x="300" y="6" width="12" height="12" rx="2" fill="#F57C00"/>
    <text x="318" y="16" font-family="'Segoe UI', Arial" font-size="10" fill="#37474F">RNA Polymerase</text>
    <text x="580" y="16" font-family="'Segoe UI', Arial" font-size="10" font-style="italic" fill="#607D8B">Complementary base pairing: A-U, T-A, G-C, C-G</text>
  </g>
</svg>
