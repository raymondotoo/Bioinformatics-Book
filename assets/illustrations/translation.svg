<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="260" viewBox="0 0 600 260">
  <style>
    .mRNA{fill:none;stroke:#f06292;stroke-width:6}
    .rib{fill:#fff;stroke:#6d4c41;stroke-width:3}
    .text{font:600 14px 'Helvetica Neue', Arial, sans-serif; fill:#2a2a2a}
  </style>
  <rect width="100%" height="100%" fill="#fff"/>
  <path class="mRNA" d="M20 60 C120 40 240 40 360 60 C480 80 560 100 580 120" />
  <g transform="translate(200,120)">
    <ellipse class="rib" cx="120" cy="20" rx="120" ry="40" />
    <text class="text" x="120" y="25" text-anchor="middle">Ribosome</text>
  </g>
  <text class="text" x="20" y="50">mRNA</text>
  <text class="text" x="20" y="200">Translation: codons → amino acids → protein</text>
</svg>
