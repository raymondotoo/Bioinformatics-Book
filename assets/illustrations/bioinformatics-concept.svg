<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="300" viewBox="0 0 600 300">
  <style>
    .box{fill:#fff;stroke:#90a4ae;stroke-width:2;rx:10}
    .text{font:700 16px 'Helvetica Neue', Arial, sans-serif; fill:#263238}
    .sub{font:600 12px 'Helvetica Neue', Arial, sans-serif; fill:#37474f}
  </style>
  <rect width="100%" height="100%" fill="#E8F5E9"/>
  <g transform="translate(30,40)">
    <rect class="box" x="0" y="0" width="160" height="80"/>
    <text class="text" x="80" y="45" text-anchor="middle">DNA</text>
    <rect class="box" x="220" y="0" width="160" height="80"/>
    <text class="text" x="300" y="45" text-anchor="middle">Analysis</text>
    <rect class="box" x="440" y="0" width="120" height="80"/>
    <text class="text" x="500" y="45" text-anchor="middle">Results</text>

    <path d="M160 40 L220 40" stroke="#3949ab" stroke-width="8" stroke-linecap="round" />
    <path d="M380 40 L440 40" stroke="#3949ab" stroke-width="8" stroke-linecap="round" />
  </g>
  <text class="sub" x="18" y="18">Bioinformatics: analyzing biological data with computation</text>
</svg>
