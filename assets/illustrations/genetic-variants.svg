<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="snpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E53935;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EF5350;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="normalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43A047;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#66BB6A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="indelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FB8C00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA726;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cnvGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B1FA2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#AB47BC;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#FAFAFA"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1565C0">Types of Genetic Variants</text>
  
  <!-- SNP Section -->
  <g transform="translate(50, 70)">
    <rect x="0" y="0" width="330" height="180" fill="white" stroke="#E0E0E0" rx="10" filter="url(#shadow3)"/>
    <text x="165" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E53935">SNP (Single Nucleotide Polymorphism)</text>
    
    <!-- Reference sequence -->
    <text x="20" y="60" font-family="Arial, sans-serif" font-size="12" fill="#666">Reference:</text>
    <g transform="translate(90, 45)">
      <rect x="0" y="0" width="25" height="25" fill="url(#normalGrad)" rx="3"/>
      <text x="12.5" y="17" text-anchor="middle" font-family="monospace" font-size="14" fill="white" font-weight="bold">A</text>
      <rect x="30" y="0" width="25" height="25" fill="url(#normalGrad)" rx="3"/>
      <text x="42.5" y="17" text-anchor="middle" font-family="monospace" font-size="14" fill="white" font-weight="bold">T</text>
      <rect x="60" y="0" width="25" height="25" fill="url(#normalGrad)" rx="3"/>
      <text x="72.5" y="17" text-anchor="middle" font-family="monospace" font-size="14" fill="white" font-weight="bold">C</text>
      <rect x="90" y="0" width="25" height="25" fill="url(#normalGrad)" rx="3"/>
      <text x="102.5" y="17" text-anchor="middle" font-family="monospace" font-size="14" fill="white" font-weight="bold">G</text>
      <rect x="120" y="0" width="25" height="25" fill="url(#normalGrad)" rx="3"/>
      <text x="132.5" y="17" text-anchor="middle" font-family="monospace" font-size="14" fill="white" font-weight="bold">A</text>
      <rect x="150" y="0" width="25" height="25" fill="url(#normalGrad)" rx="3"/>
      <text x="162.5" y="17" text-anchor="middle" font-family="monospace" font-size="14" fill="white" font-weight="bold">T</text>
    </g>
    
    <!-- Variant sequence -->
    <text x="20" y="105" font-family="Arial, sans-serif" font-size="12" fill="#666">Variant:</text>
    <g transform="translate(90, 90)">
      <rect x="0" y="0" width="25" height="25" fill="url(#normalGrad)" rx="3"/>
      <text x="12.5" y="17" text-anchor="middle" font-family="monospace" font-size="14" fill="white" font-weight="bold">A</text>
      <rect x="30" y="0" width="25" height="25" fill="url(#normalGrad)" rx="3"/>
      <text x="42.5" y="17" text-anchor="middle" font-family="monospace" font-size="14" fill="white" font-weight="bold">T</text>
      <rect x="60" y="0" width="25" height="25" fill="url(#snpGrad)" rx="3" stroke="#B71C1C" stroke-width="2"/>
      <text x="72.5" y="17" text-anchor="middle" font-family="monospace" font-size="14" fill="white" font-weight="bold">T</text>
      <rect x="90" y="0" width="25" height="25" fill="url(#normalGrad)" rx="3"/>
      <text x="102.5" y="17" text-anchor="middle" font-family="monospace" font-size="14" fill="white" font-weight="bold">G</text>
      <rect x="120" y="0" width="25" height="25" fill="url(#normalGrad)" rx="3"/>
      <text x="132.5" y="17" text-anchor="middle" font-family="monospace" font-size="14" fill="white" font-weight="bold">A</text>
      <rect x="150" y="0" width="25" height="25" fill="url(#normalGrad)" rx="3"/>
      <text x="162.5" y="17" text-anchor="middle" font-family="monospace" font-size="14" fill="white" font-weight="bold">T</text>
    </g>
    
    <!-- Arrow pointing to change -->
    <path d="M222,75 L222,88" stroke="#E53935" stroke-width="2" fill="none" marker-end="url(#redArrow)"/>
    
    <text x="165" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Single base substitution (C→T)</text>
    <text x="165" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">Most common type • ~1 per 1000 bases</text>
  </g>
  
  <!-- Insertion/Deletion Section -->
  <g transform="translate(420, 70)">
    <rect x="0" y="0" width="330" height="180" fill="white" stroke="#E0E0E0" rx="10" filter="url(#shadow3)"/>
    <text x="165" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FB8C00">Indels (Insertions &amp; Deletions)</text>
    
    <!-- Reference -->
    <text x="20" y="60" font-family="Arial, sans-serif" font-size="12" fill="#666">Reference:</text>
    <g transform="translate(90, 45)">
      <rect x="0" y="0" width="25" height="25" fill="url(#normalGrad)" rx="3"/>
      <text x="12.5" y="17" text-anchor="middle" font-family="monospace" font-size="14" fill="white" font-weight="bold">G</text>
      <rect x="30" y="0" width="25" height="25" fill="url(#normalGrad)" rx="3"/>
      <text x="42.5" y="17" text-anchor="middle" font-family="monospace" font-size="14" fill="white" font-weight="bold">C</text>
      <rect x="60" y="0" width="25" height="25" fill="url(#normalGrad)" rx="3"/>
      <text x="72.5" y="17" text-anchor="middle" font-family="monospace" font-size="14" fill="white" font-weight="bold">T</text>
      <rect x="90" y="0" width="25" height="25" fill="url(#normalGrad)" rx="3"/>
      <text x="102.5" y="17" text-anchor="middle" font-family="monospace" font-size="14" fill="white" font-weight="bold">A</text>
      <rect x="120" y="0" width="25" height="25" fill="url(#normalGrad)" rx="3"/>
      <text x="132.5" y="17" text-anchor="middle" font-family="monospace" font-size="14" fill="white" font-weight="bold">G</text>
    </g>
    
    <!-- Insertion variant -->
    <text x="20" y="105" font-family="Arial, sans-serif" font-size="12" fill="#666">Insertion:</text>
    <g transform="translate(90, 90)">
      <rect x="0" y="0" width="25" height="25" fill="url(#normalGrad)" rx="3"/>
      <text x="12.5" y="17" text-anchor="middle" font-family="monospace" font-size="14" fill="white" font-weight="bold">G</text>
      <rect x="30" y="0" width="25" height="25" fill="url(#normalGrad)" rx="3"/>
      <text x="42.5" y="17" text-anchor="middle" font-family="monospace" font-size="14" fill="white" font-weight="bold">C</text>
      <rect x="60" y="0" width="25" height="25" fill="url(#indelGrad)" rx="3" stroke="#E65100" stroke-width="2"/>
      <text x="72.5" y="17" text-anchor="middle" font-family="monospace" font-size="14" fill="white" font-weight="bold">A</text>
      <rect x="90" y="0" width="25" height="25" fill="url(#indelGrad)" rx="3" stroke="#E65100" stroke-width="2"/>
      <text x="102.5" y="17" text-anchor="middle" font-family="monospace" font-size="14" fill="white" font-weight="bold">A</text>
      <rect x="120" y="0" width="25" height="25" fill="url(#normalGrad)" rx="3"/>
      <text x="132.5" y="17" text-anchor="middle" font-family="monospace" font-size="14" fill="white" font-weight="bold">T</text>
      <rect x="150" y="0" width="25" height="25" fill="url(#normalGrad)" rx="3"/>
      <text x="162.5" y="17" text-anchor="middle" font-family="monospace" font-size="14" fill="white" font-weight="bold">A</text>
    </g>
    
    <text x="165" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">+AA insertion after position 2</text>
    <text x="165" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">Can cause frameshift mutations</text>
  </g>
  
  <!-- CNV Section -->
  <g transform="translate(50, 270)">
    <rect x="0" y="0" width="330" height="180" fill="white" stroke="#E0E0E0" rx="10" filter="url(#shadow3)"/>
    <text x="165" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#7B1FA2">CNV (Copy Number Variation)</text>
    
    <!-- Normal copies -->
    <text x="20" y="60" font-family="Arial, sans-serif" font-size="12" fill="#666">Normal:</text>
    <g transform="translate(90, 45)">
      <rect x="0" y="0" width="80" height="25" fill="url(#normalGrad)" rx="3"/>
      <text x="40" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">Gene A</text>
      <rect x="90" y="0" width="80" height="25" fill="url(#normalGrad)" rx="3"/>
      <text x="130" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">Gene A</text>
    </g>
    <text x="280" y="60" font-family="Arial, sans-serif" font-size="11" fill="#666">2 copies</text>
    
    <!-- Duplication -->
    <text x="20" y="105" font-family="Arial, sans-serif" font-size="12" fill="#666">Duplication:</text>
    <g transform="translate(90, 90)">
      <rect x="0" y="0" width="50" height="25" fill="url(#cnvGrad)" rx="3"/>
      <text x="25" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white" font-weight="bold">Gene A</text>
      <rect x="55" y="0" width="50" height="25" fill="url(#cnvGrad)" rx="3"/>
      <text x="80" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white" font-weight="bold">Gene A</text>
      <rect x="110" y="0" width="50" height="25" fill="url(#cnvGrad)" rx="3"/>
      <text x="135" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white" font-weight="bold">Gene A</text>
      <rect x="165" y="0" width="50" height="25" fill="url(#cnvGrad)" rx="3"/>
      <text x="190" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white" font-weight="bold">Gene A</text>
    </g>
    <text x="280" y="105" font-family="Arial, sans-serif" font-size="11" fill="#7B1FA2" font-weight="bold">4 copies</text>
    
    <!-- Deletion -->
    <text x="20" y="150" font-family="Arial, sans-serif" font-size="12" fill="#666">Deletion:</text>
    <g transform="translate(90, 135)">
      <rect x="0" y="0" width="80" height="25" fill="#E0E0E0" rx="3" stroke="#BDBDBD" stroke-dasharray="4"/>
      <text x="40" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#999">deleted</text>
      <rect x="90" y="0" width="80" height="25" fill="url(#normalGrad)" rx="3"/>
      <text x="130" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">Gene A</text>
    </g>
    <text x="280" y="150" font-family="Arial, sans-serif" font-size="11" fill="#E53935" font-weight="bold">1 copy</text>
  </g>
  
  <!-- Structural Variants Section -->
  <g transform="translate(420, 270)">
    <rect x="0" y="0" width="330" height="180" fill="white" stroke="#E0E0E0" rx="10" filter="url(#shadow3)"/>
    <text x="165" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1565C0">Structural Variants</text>
    
    <!-- Inversion -->
    <text x="20" y="60" font-family="Arial, sans-serif" font-size="12" fill="#666">Inversion:</text>
    <g transform="translate(90, 45)">
      <rect x="0" y="0" width="40" height="20" fill="#42A5F5" rx="2"/>
      <text x="20" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">A</text>
      <rect x="45" y="0" width="40" height="20" fill="#66BB6A" rx="2"/>
      <text x="65" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">B</text>
      <rect x="90" y="0" width="40" height="20" fill="#FF7043" rx="2"/>
      <text x="110" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">C</text>
      <rect x="135" y="0" width="40" height="20" fill="#AB47BC" rx="2"/>
      <text x="155" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">D</text>
    </g>
    <text x="280" y="55" font-family="Arial, sans-serif" font-size="10" fill="#666">→</text>
    <text x="295" y="60" font-family="Arial, sans-serif" font-size="9" fill="#1565C0">A-C-B-D</text>
    
    <!-- Translocation -->
    <text x="20" y="100" font-family="Arial, sans-serif" font-size="12" fill="#666">Translocation:</text>
    <g transform="translate(110, 78)">
      <text x="0" y="15" font-family="Arial, sans-serif" font-size="10" fill="#666">Chr 1:</text>
      <rect x="40" y="0" width="50" height="20" fill="#42A5F5" rx="2"/>
      <rect x="95" y="0" width="50" height="20" fill="#E91E63" rx="2" stroke="#C2185B" stroke-width="2"/>
    </g>
    <g transform="translate(110, 103)">
      <text x="0" y="15" font-family="Arial, sans-serif" font-size="10" fill="#666">Chr 2:</text>
      <rect x="40" y="0" width="50" height="20" fill="#FFC107" rx="2"/>
      <rect x="95" y="0" width="50" height="20" fill="#66BB6A" rx="2"/>
    </g>
    
    <!-- Fusion -->
    <text x="20" y="155" font-family="Arial, sans-serif" font-size="12" fill="#666">Fusion Gene:</text>
    <g transform="translate(110, 140)">
      <rect x="0" y="0" width="60" height="22" fill="#42A5F5" rx="2"/>
      <text x="30" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">BCR</text>
      <rect x="60" y="0" width="60" height="22" fill="#E91E63" rx="2"/>
      <text x="90" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">ABL1</text>
      <text x="150" y="15" font-family="Arial, sans-serif" font-size="10" fill="#666">→ CML</text>
    </g>
  </g>
  
  <!-- Footer -->
  <text x="400" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888">Understanding genetic variants is fundamental to genomics, personalized medicine, and disease research</text>
</svg>