<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="pythonBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#306998;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4B8BBE;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pythonYellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD43B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFE873;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dnaGradBio" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E53935;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EF5350;stop-opacity:1" />
    </linearGradient>
    <filter id="shadowBio" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#FAFAFA"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#306998">Biopython: Python for Bioinformatics</text>
  
  <!-- Central Logo -->
  <g transform="translate(325, 55)">
    <!-- Python logo stylized with DNA -->
    <ellipse cx="75" cy="50" rx="70" ry="45" fill="url(#pythonBlue)" filter="url(#shadowBio)"/>
    <ellipse cx="75" cy="50" rx="55" ry="32" fill="url(#pythonYellow)"/>
    
    <!-- DNA double helix inside -->
    <path d="M45,30 Q60,40 45,50 Q30,60 45,70" stroke="#306998" stroke-width="4" fill="none"/>
    <path d="M105,30 Q90,40 105,50 Q120,60 105,70" stroke="#306998" stroke-width="4" fill="none"/>
    <line x1="50" y1="40" x2="100" y2="40" stroke="#E53935" stroke-width="2"/>
    <line x1="45" y1="50" x2="105" y2="50" stroke="#43A047" stroke-width="2"/>
    <line x1="50" y1="60" x2="100" y2="60" stroke="#1565C0" stroke-width="2"/>
    
    <text x="75" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#306998">Biopython</text>
  </g>
  
  <!-- Module Cards -->
  <!-- Seq Module -->
  <g transform="translate(30, 160)">
    <rect x="0" y="0" width="175" height="140" fill="white" stroke="#306998" stroke-width="2" rx="8" filter="url(#shadowBio)"/>
    <rect x="0" y="0" width="175" height="30" fill="url(#pythonBlue)" rx="8"/>
    <rect x="0" y="22" width="175" height="8" fill="url(#pythonBlue)"/>
    <text x="87" y="22" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="white">Bio.Seq</text>
    
    <text x="10" y="50" font-family="monospace" font-size="9" fill="#666">from Bio.Seq import Seq</text>
    <text x="10" y="68" font-family="monospace" font-size="9" fill="#333">seq = Seq("ATGCGA")</text>
    <text x="10" y="86" font-family="monospace" font-size="9" fill="#333">seq.complement()</text>
    <text x="10" y="100" font-family="monospace" font-size="9" fill="#43A047"># TACGCT</text>
    <text x="10" y="118" font-family="monospace" font-size="9" fill="#333">seq.translate()</text>
    <text x="10" y="132" font-family="monospace" font-size="9" fill="#43A047"># MR</text>
  </g>
  
  <!-- SeqIO Module -->
  <g transform="translate(220, 160)">
    <rect x="0" y="0" width="175" height="140" fill="white" stroke="#306998" stroke-width="2" rx="8" filter="url(#shadowBio)"/>
    <rect x="0" y="0" width="175" height="30" fill="url(#pythonBlue)" rx="8"/>
    <rect x="0" y="22" width="175" height="8" fill="url(#pythonBlue)"/>
    <text x="87" y="22" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="white">Bio.SeqIO</text>
    
    <text x="10" y="50" font-family="monospace" font-size="8" fill="#666">from Bio import SeqIO</text>
    <text x="10" y="68" font-family="monospace" font-size="8" fill="#333">for rec in SeqIO.parse(</text>
    <text x="20" y="82" font-family="monospace" font-size="8" fill="#E53935">"file.fasta", "fasta"</text>
    <text x="10" y="96" font-family="monospace" font-size="8" fill="#333">):</text>
    <text x="20" y="110" font-family="monospace" font-size="8" fill="#333">print(rec.id)</text>
    <text x="20" y="124" font-family="monospace" font-size="8" fill="#333">print(len(rec.seq))</text>
  </g>
  
  <!-- Blast Module -->
  <g transform="translate(410, 160)">
    <rect x="0" y="0" width="175" height="140" fill="white" stroke="#306998" stroke-width="2" rx="8" filter="url(#shadowBio)"/>
    <rect x="0" y="0" width="175" height="30" fill="url(#pythonBlue)" rx="8"/>
    <rect x="0" y="22" width="175" height="8" fill="url(#pythonBlue)"/>
    <text x="87" y="22" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="white">Bio.Blast</text>
    
    <text x="10" y="50" font-family="monospace" font-size="8" fill="#666">from Bio.Blast import</text>
    <text x="20" y="64" font-family="monospace" font-size="8" fill="#666">NCBIWWW, NCBIXML</text>
    <text x="10" y="82" font-family="monospace" font-size="8" fill="#333">result = NCBIWWW.</text>
    <text x="20" y="96" font-family="monospace" font-size="8" fill="#333">qblast("blastn",</text>
    <text x="30" y="110" font-family="monospace" font-size="8" fill="#E53935">"nt", sequence)</text>
    <text x="10" y="128" font-family="monospace" font-size="8" fill="#333">records = NCBIXML...</text>
  </g>
  
  <!-- PDB Module -->
  <g transform="translate(600, 160)">
    <rect x="0" y="0" width="175" height="140" fill="white" stroke="#306998" stroke-width="2" rx="8" filter="url(#shadowBio)"/>
    <rect x="0" y="0" width="175" height="30" fill="url(#pythonBlue)" rx="8"/>
    <rect x="0" y="22" width="175" height="8" fill="url(#pythonBlue)"/>
    <text x="87" y="22" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="white">Bio.PDB</text>
    
    <text x="10" y="50" font-family="monospace" font-size="8" fill="#666">from Bio.PDB import</text>
    <text x="20" y="64" font-family="monospace" font-size="8" fill="#666">PDBParser</text>
    <text x="10" y="82" font-family="monospace" font-size="8" fill="#333">parser = PDBParser()</text>
    <text x="10" y="100" font-family="monospace" font-size="8" fill="#333">struct = parser.</text>
    <text x="20" y="114" font-family="monospace" font-size="8" fill="#333">get_structure(</text>
    <text x="30" y="128" font-family="monospace" font-size="8" fill="#E53935">"1ABC", "1abc.pdb")</text>
  </g>
  
  <!-- Align Module -->
  <g transform="translate(125, 320)">
    <rect x="0" y="0" width="175" height="140" fill="white" stroke="#306998" stroke-width="2" rx="8" filter="url(#shadowBio)"/>
    <rect x="0" y="0" width="175" height="30" fill="url(#pythonYellow)" rx="8"/>
    <rect x="0" y="22" width="175" height="8" fill="url(#pythonYellow)"/>
    <text x="87" y="22" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#306998">Bio.Align</text>
    
    <text x="10" y="50" font-family="monospace" font-size="8" fill="#666">from Bio import Align</text>
    <text x="10" y="68" font-family="monospace" font-size="8" fill="#333">aligner = Align.</text>
    <text x="20" y="82" font-family="monospace" font-size="8" fill="#333">PairwiseAligner()</text>
    <text x="10" y="100" font-family="monospace" font-size="8" fill="#333">alignments = aligner.</text>
    <text x="20" y="114" font-family="monospace" font-size="8" fill="#333">align(seq1, seq2)</text>
    <text x="10" y="132" font-family="monospace" font-size="8" fill="#43A047"># Score: 45.0</text>
  </g>
  
  <!-- Phylo Module -->
  <g transform="translate(315, 320)">
    <rect x="0" y="0" width="175" height="140" fill="white" stroke="#306998" stroke-width="2" rx="8" filter="url(#shadowBio)"/>
    <rect x="0" y="0" width="175" height="30" fill="url(#pythonYellow)" rx="8"/>
    <rect x="0" y="22" width="175" height="8" fill="url(#pythonYellow)"/>
    <text x="87" y="22" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#306998">Bio.Phylo</text>
    
    <text x="10" y="50" font-family="monospace" font-size="8" fill="#666">from Bio import Phylo</text>
    <text x="10" y="68" font-family="monospace" font-size="8" fill="#333">tree = Phylo.read(</text>
    <text x="20" y="82" font-family="monospace" font-size="8" fill="#E53935">"tree.nwk", "newick")</text>
    <text x="10" y="100" font-family="monospace" font-size="8" fill="#333">Phylo.draw(tree)</text>
    
    <!-- Mini tree visualization -->
    <line x1="30" y1="115" x2="60" y2="115" stroke="#306998" stroke-width="1.5"/>
    <line x1="60" y1="115" x2="60" y2="105" stroke="#306998" stroke-width="1.5"/>
    <line x1="60" y1="115" x2="60" y2="125" stroke="#306998" stroke-width="1.5"/>
    <line x1="60" y1="105" x2="80" y2="105" stroke="#306998" stroke-width="1.5"/>
    <line x1="60" y1="125" x2="80" y2="125" stroke="#306998" stroke-width="1.5"/>
    <circle cx="85" cy="105" r="4" fill="#E53935"/>
    <circle cx="85" cy="125" r="4" fill="#43A047"/>
  </g>
  
  <!-- Entrez Module -->
  <g transform="translate(505, 320)">
    <rect x="0" y="0" width="175" height="140" fill="white" stroke="#306998" stroke-width="2" rx="8" filter="url(#shadowBio)"/>
    <rect x="0" y="0" width="175" height="30" fill="url(#pythonYellow)" rx="8"/>
    <rect x="0" y="22" width="175" height="8" fill="url(#pythonYellow)"/>
    <text x="87" y="22" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#306998">Bio.Entrez</text>
    
    <text x="10" y="50" font-family="monospace" font-size="8" fill="#666">from Bio import Entrez</text>
    <text x="10" y="68" font-family="monospace" font-size="8" fill="#333">Entrez.email = "..."</text>
    <text x="10" y="86" font-family="monospace" font-size="8" fill="#333">handle = Entrez.</text>
    <text x="20" y="100" font-family="monospace" font-size="8" fill="#333">efetch(db="nucl",</text>
    <text x="30" y="114" font-family="monospace" font-size="8" fill="#E53935">id="NM_001301717")</text>
    <text x="10" y="132" font-family="monospace" font-size="8" fill="#43A047"># NCBI records</text>
  </g>
  
  <!-- Footer -->
  <text x="400" y="485" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888">pip install biopython | Comprehensive toolkit for computational biology and bioinformatics</text>
</svg>