<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="dnaGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#42A5F5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dnaGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B1FA2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BA68C8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="newStrand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43A047;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#81C784;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E65100"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#FAFAFA"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1565C0">DNA Replication: Semi-Conservative Model</text>
  
  <!-- Original double helix (left) -->
  <g transform="translate(100, 80)">
    <text x="60" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">Parent DNA</text>
    
    <!-- Left strand -->
    <path d="M30,30 Q60,60 30,90 Q0,120 30,150 Q60,180 30,210 Q0,240 30,270 Q60,300 30,330" 
          stroke="url(#dnaGrad1)" stroke-width="8" fill="none" stroke-linecap="round" filter="url(#shadow2)"/>
    <!-- Right strand -->
    <path d="M90,30 Q60,60 90,90 Q120,120 90,150 Q60,180 90,210 Q120,240 90,270 Q60,300 90,330" 
          stroke="url(#dnaGrad2)" stroke-width="8" fill="none" stroke-linecap="round" filter="url(#shadow2)"/>
    
    <!-- Base pairs -->
    <line x1="38" y1="60" x2="82" y2="60" stroke="#FF7043" stroke-width="3"/>
    <line x1="30" y1="90" x2="90" y2="90" stroke="#66BB6A" stroke-width="3"/>
    <line x1="38" y1="120" x2="82" y2="120" stroke="#42A5F5" stroke-width="3"/>
    <line x1="30" y1="150" x2="90" y2="150" stroke="#FF7043" stroke-width="3"/>
    <line x1="38" y1="180" x2="82" y2="180" stroke="#66BB6A" stroke-width="3"/>
    <line x1="30" y1="210" x2="90" y2="210" stroke="#42A5F5" stroke-width="3"/>
    <line x1="38" y1="240" x2="82" y2="240" stroke="#FF7043" stroke-width="3"/>
    <line x1="30" y1="270" x2="90" y2="270" stroke="#66BB6A" stroke-width="3"/>
    <line x1="38" y1="300" x2="82" y2="300" stroke="#42A5F5" stroke-width="3"/>
  </g>
  
  <!-- Arrow -->
  <line x1="250" y1="250" x2="320" y2="250" stroke="#E65100" stroke-width="4" marker-end="url(#arrowhead)"/>
  <text x="285" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#E65100">Replication</text>
  
  <!-- Replication fork (middle) -->
  <g transform="translate(350, 80)">
    <text x="60" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">Replication Fork</text>
    
    <!-- Opening strands -->
    <path d="M30,30 Q60,60 30,90 Q0,120 30,150" stroke="url(#dnaGrad1)" stroke-width="8" fill="none" stroke-linecap="round" filter="url(#shadow2)"/>
    <path d="M90,30 Q60,60 90,90 Q120,120 90,150" stroke="url(#dnaGrad2)" stroke-width="8" fill="none" stroke-linecap="round" filter="url(#shadow2)"/>
    
    <!-- Separated strands -->
    <path d="M10,150 Q-20,180 -30,210 Q-40,250 -30,290 Q-20,330 10,360" stroke="url(#dnaGrad1)" stroke-width="8" fill="none" stroke-linecap="round" filter="url(#shadow2)"/>
    <path d="M110,150 Q140,180 150,210 Q160,250 150,290 Q140,330 110,360" stroke="url(#dnaGrad2)" stroke-width="8" fill="none" stroke-linecap="round" filter="url(#shadow2)"/>
    
    <!-- New complementary strands -->
    <path d="M50,150 Q20,180 10,210 Q0,250 10,290 Q20,330 50,360" stroke="url(#newStrand)" stroke-width="8" fill="none" stroke-linecap="round" stroke-dasharray="5,5" filter="url(#shadow2)"/>
    <path d="M70,150 Q100,180 110,210 Q120,250 110,290 Q100,330 70,360" stroke="url(#newStrand)" stroke-width="8" fill="none" stroke-linecap="round" stroke-dasharray="5,5" filter="url(#shadow2)"/>
    
    <!-- Base pairs top -->
    <line x1="38" y1="60" x2="82" y2="60" stroke="#FF7043" stroke-width="3"/>
    <line x1="30" y1="90" x2="90" y2="90" stroke="#66BB6A" stroke-width="3"/>
    <line x1="38" y1="120" x2="82" y2="120" stroke="#42A5F5" stroke-width="3"/>
    
    <!-- Helicase -->
    <ellipse cx="60" cy="155" rx="30" ry="15" fill="#FFC107" stroke="#FF8F00" stroke-width="2" filter="url(#shadow2)"/>
    <text x="60" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Helicase</text>
    
    <!-- DNA Polymerase labels -->
    <ellipse cx="-10" cy="250" rx="25" ry="12" fill="#E91E63" stroke="#C2185B" stroke-width="2"/>
    <text x="-10" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">Pol III</text>
    
    <ellipse cx="130" cy="250" rx="25" ry="12" fill="#E91E63" stroke="#C2185B" stroke-width="2"/>
    <text x="130" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">Pol III</text>
  </g>
  
  <!-- Arrow -->
  <line x1="520" y1="250" x2="590" y2="250" stroke="#E65100" stroke-width="4" marker-end="url(#arrowhead)"/>
  
  <!-- Two daughter DNA molecules (right) -->
  <g transform="translate(620, 60)">
    <text x="80" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">Daughter DNA</text>
    
    <!-- First daughter -->
    <g transform="translate(0, 20)">
      <path d="M20,20 Q40,40 20,60 Q0,80 20,100 Q40,120 20,140" stroke="url(#dnaGrad1)" stroke-width="6" fill="none" stroke-linecap="round"/>
      <path d="M60,20 Q40,40 60,60 Q80,80 60,100 Q40,120 60,140" stroke="url(#newStrand)" stroke-width="6" fill="none" stroke-linecap="round"/>
      <line x1="25" y1="40" x2="55" y2="40" stroke="#FF7043" stroke-width="2"/>
      <line x1="20" y1="60" x2="60" y2="60" stroke="#66BB6A" stroke-width="2"/>
      <line x1="25" y1="80" x2="55" y2="80" stroke="#42A5F5" stroke-width="2"/>
      <line x1="20" y1="100" x2="60" y2="100" stroke="#FF7043" stroke-width="2"/>
      <line x1="25" y1="120" x2="55" y2="120" stroke="#66BB6A" stroke-width="2"/>
    </g>
    
    <!-- Second daughter -->
    <g transform="translate(80, 20)">
      <path d="M20,20 Q40,40 20,60 Q0,80 20,100 Q40,120 20,140" stroke="url(#newStrand)" stroke-width="6" fill="none" stroke-linecap="round"/>
      <path d="M60,20 Q40,40 60,60 Q80,80 60,100 Q40,120 60,140" stroke="url(#dnaGrad2)" stroke-width="6" fill="none" stroke-linecap="round"/>
      <line x1="25" y1="40" x2="55" y2="40" stroke="#FF7043" stroke-width="2"/>
      <line x1="20" y1="60" x2="60" y2="60" stroke="#66BB6A" stroke-width="2"/>
      <line x1="25" y1="80" x2="55" y2="80" stroke="#42A5F5" stroke-width="2"/>
      <line x1="20" y1="100" x2="60" y2="100" stroke="#FF7043" stroke-width="2"/>
      <line x1="25" y1="120" x2="55" y2="120" stroke="#66BB6A" stroke-width="2"/>
    </g>
  </g>
  
  <!-- Legend -->
  <g transform="translate(50, 440)">
    <rect x="0" y="0" width="700" height="50" fill="white" stroke="#E0E0E0" rx="5"/>
    <line x1="20" y1="25" x2="50" y2="25" stroke="url(#dnaGrad1)" stroke-width="6"/>
    <text x="60" y="30" font-family="Arial, sans-serif" font-size="11" fill="#333">Parent Strand 1</text>
    
    <line x1="180" y1="25" x2="210" y2="25" stroke="url(#dnaGrad2)" stroke-width="6"/>
    <text x="220" y="30" font-family="Arial, sans-serif" font-size="11" fill="#333">Parent Strand 2</text>
    
    <line x1="340" y1="25" x2="370" y2="25" stroke="url(#newStrand)" stroke-width="6"/>
    <text x="380" y="30" font-family="Arial, sans-serif" font-size="11" fill="#333">Newly Synthesized</text>
    
    <rect x="520" y="18" width="14" height="14" fill="#FFC107" stroke="#FF8F00"/>
    <text x="545" y="30" font-family="Arial, sans-serif" font-size="11" fill="#333">Helicase</text>
    
    <rect x="620" y="18" width="14" height="14" fill="#E91E63" stroke="#C2185B"/>
    <text x="645" y="30" font-family="Arial, sans-serif" font-size="11" fill="#333">Polymerase</text>
  </g>
</svg>