<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Interactive Phylogenetic Tree</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>body{font-family:Arial,Helvetica,sans-serif} svg{width:100%;height:600px}</style>
</head>
<body>
  <h2>Interactive Phylogenetic Tree</h2>
  <div id="tree"></div>
  <script>
    // Simple hierarchical data
    const data = {
      name: 'Root', children: [
        {name: 'Mammals', children:[{name:'Primates'},{name:'Carnivora'}]},
        {name: 'Fish', children:[{name:'Ray-finned'},{name:'Cartilaginous'}]}
      ]
    };

    const width = 900, dx = 10, dy = 140;
    const diagonal = d3.linkHorizontal().x(d=>d.y).y(d=>d.x);

    const tree = d3.tree().nodeSize([dx, dy]);
    const root = d3.hierarchy(data);
    root.x0 = dy / 2; root.y0 = 0;

    const svg = d3.select('#tree').append('svg')
      .attr('viewBox', [-50, -20, width, 600])
      .style('font', '12px sans-serif');

    const g = svg.append('g').attr('transform','translate(40,20)');

    function update(source){
      const nodes = tree(root);
      const links = nodes.links();

      const link = g.selectAll('.link').data(links, d=>d.target.data.name);
      link.enter().append('path').attr('class','link').attr('d', d => diagonal({source:d.source, target:d.target})).attr('fill','none').attr('stroke','#555');

      const node = g.selectAll('.node').data(nodes.descendants(), d=>d.data.name);
      const nodeEnter = node.enter().append('g').attr('class','node').attr('transform', d=>`translate(${d.y},${d.x})`);
      nodeEnter.append('circle').attr('r',6).attr('fill','#1e88e5');
      nodeEnter.append('text').attr('x',10).attr('dy',4).text(d=>d.data.name);
    }

    update(root);
  </script>
</body>
</html>
