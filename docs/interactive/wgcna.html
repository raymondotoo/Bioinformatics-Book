<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>WGCNA Interactive Heatmap</title>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  <style>body{font-family:Arial,Helvetica,sans-serif} #heatmap{width:100%;height:700px}</style>
</head>
<body>
  <h2>WGCNA Module-Trait Heatmap (Interactive)</h2>
  <div id="heatmap"></div>
  <script>
    const z = [];
    for(let i=0;i<10;i++){ const row=[]; for(let j=0;j<8;j++) row.push(Math.random()*2-1); z.push(row);} 
    const data = [{ z: z, type: 'heatmap', colorscale:'RdBu', reversescale:true }];
    Plotly.newPlot('heatmap', data, {title:'Module-Trait Correlations'});
  </script>
</body>
</html>
