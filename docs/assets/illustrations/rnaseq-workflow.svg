<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="rnaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E53935;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EF5350;stop-opacity:1" />
    </linearGradient>
    <filter id="shadowRNA" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowRNA" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1565C0"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#FAFAFA"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E53935">RNA-Seq Analysis Workflow</text>
  
  <!-- Step boxes connected horizontally -->
  <!-- Step 1: Sample -->
  <g transform="translate(30, 70)">
    <rect x="0" y="0" width="110" height="100" fill="white" stroke="#E53935" stroke-width="2" rx="8" filter="url(#shadowRNA)"/>
    <circle cx="55" cy="40" r="25" fill="#FFEBEE"/>
    <text x="55" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20">🧫</text>
    <text x="55" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#C62828">RNA</text>
    <text x="55" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">1. Extract RNA</text>
  </g>
  
  <path d="M145,120 L175,120" stroke="#1565C0" stroke-width="2" marker-end="url(#arrowRNA)"/>
  
  <!-- Step 2: Sequencing -->
  <g transform="translate(180, 70)">
    <rect x="0" y="0" width="110" height="100" fill="white" stroke="#FB8C00" stroke-width="2" rx="8" filter="url(#shadowRNA)"/>
    <rect x="25" y="25" width="60" height="40" fill="#FFF3E0" rx="4"/>
    <rect x="30" y="30" width="50" height="5" fill="#FB8C00" rx="1"/>
    <rect x="30" y="38" width="45" height="5" fill="#FFA726" rx="1"/>
    <rect x="30" y="46" width="50" height="5" fill="#FB8C00" rx="1"/>
    <rect x="30" y="54" width="40" height="5" fill="#FFA726" rx="1"/>
    <text x="55" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">2. Sequence</text>
  </g>
  
  <path d="M295,120 L325,120" stroke="#1565C0" stroke-width="2" marker-end="url(#arrowRNA)"/>
  
  <!-- Step 3: QC -->
  <g transform="translate(330, 70)">
    <rect x="0" y="0" width="110" height="100" fill="white" stroke="#43A047" stroke-width="2" rx="8" filter="url(#shadowRNA)"/>
    <text x="55" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="24">✓</text>
    <text x="55" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2E7D32">FastQC</text>
    <text x="55" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">3. Quality Check</text>
  </g>
  
  <path d="M445,120 L475,120" stroke="#1565C0" stroke-width="2" marker-end="url(#arrowRNA)"/>
  
  <!-- Step 4: Alignment -->
  <g transform="translate(480, 70)">
    <rect x="0" y="0" width="110" height="100" fill="white" stroke="#1565C0" stroke-width="2" rx="8" filter="url(#shadowRNA)"/>
    <g transform="translate(20, 25)">
      <rect x="0" y="0" width="70" height="8" fill="#E3F2FD" rx="2"/>
      <rect x="5" y="12" width="25" height="6" fill="#1565C0" rx="1"/>
      <rect x="35" y="12" width="30" height="6" fill="#1565C0" rx="1"/>
      <rect x="10" y="22" width="55" height="6" fill="#42A5F5" rx="1"/>
      <rect x="5" y="32" width="60" height="6" fill="#1565C0" rx="1"/>
    </g>
    <text x="55" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">4. Align/Map</text>
  </g>
  
  <path d="M595,120 L625,120" stroke="#1565C0" stroke-width="2" marker-end="url(#arrowRNA)"/>
  
  <!-- Step 5: Quantify -->
  <g transform="translate(630, 70)">
    <rect x="0" y="0" width="140" height="100" fill="white" stroke="#7B1FA2" stroke-width="2" rx="8" filter="url(#shadowRNA)"/>
    <g transform="translate(20, 20)">
      <rect x="0" y="25" width="15" height="35" fill="#7B1FA2"/>
      <rect x="20" y="35" width="15" height="25" fill="#AB47BC"/>
      <rect x="40" y="15" width="15" height="45" fill="#7B1FA2"/>
      <rect x="60" y="40" width="15" height="20" fill="#AB47BC"/>
      <rect x="80" y="30" width="15" height="30" fill="#7B1FA2"/>
    </g>
    <text x="70" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">5. Count Reads</text>
  </g>
  
  <!-- Main Analysis Section -->
  <g transform="translate(50, 190)">
    <rect x="0" y="0" width="700" height="130" fill="white" stroke="#1565C0" stroke-width="2" rx="10" filter="url(#shadowRNA)"/>
    <rect x="0" y="0" width="700" height="30" fill="#1565C0" rx="10"/>
    <rect x="0" y="22" width="700" height="8" fill="#1565C0"/>
    <text x="350" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">6. Differential Expression Analysis</text>
    
    <!-- Count matrix -->
    <g transform="translate(30, 45)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Count Matrix:</text>
      <rect x="0" y="10" width="150" height="70" fill="#F5F5F5" rx="3"/>
      <text x="10" y="28" font-family="monospace" font-size="8" fill="#666">Gene    Ctrl  Treat</text>
      <text x="10" y="42" font-family="monospace" font-size="8" fill="#333">BRCA1   1250  3420</text>
      <text x="10" y="56" font-family="monospace" font-size="8" fill="#333">TP53    890   245</text>
      <text x="10" y="70" font-family="monospace" font-size="8" fill="#333">MYC     2100  2150</text>
    </g>
    
    <!-- Statistical test -->
    <g transform="translate(220, 45)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Statistical Testing:</text>
      <rect x="0" y="10" width="200" height="70" fill="#E8F5E9" rx="3"/>
      <text x="10" y="30" font-family="Arial, sans-serif" font-size="9" fill="#666">• Negative binomial model</text>
      <text x="10" y="45" font-family="Arial, sans-serif" font-size="9" fill="#666">• Normalization (TMM, DESeq2)</text>
      <text x="10" y="60" font-family="Arial, sans-serif" font-size="9" fill="#666">• Multiple testing correction (FDR)</text>
      <text x="10" y="75" font-family="Arial, sans-serif" font-size="9" fill="#2E7D32" font-weight="bold">Tools: DESeq2, edgeR, limma</text>
    </g>
    
    <!-- Results -->
    <g transform="translate(460, 45)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Output:</text>
      <rect x="0" y="10" width="200" height="70" fill="#FFF3E0" rx="3"/>
      <text x="10" y="30" font-family="Arial, sans-serif" font-size="9" fill="#666">• Log2 Fold Change</text>
      <text x="10" y="45" font-family="Arial, sans-serif" font-size="9" fill="#666">• P-value &amp; adjusted P-value</text>
      <text x="10" y="60" font-family="Arial, sans-serif" font-size="9" fill="#666">• DEG lists (up/down regulated)</text>
      <text x="10" y="75" font-family="Arial, sans-serif" font-size="9" fill="#E65100" font-weight="bold">|FC| &gt; 2 &amp; padj &lt; 0.05</text>
    </g>
  </g>
  
  <!-- Downstream Analysis -->
  <g transform="translate(50, 340)">
    <rect x="0" y="0" width="700" height="115" fill="white" stroke="#7B1FA2" stroke-width="2" rx="10" filter="url(#shadowRNA)"/>
    <text x="350" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#7B1FA2">7. Downstream Analysis &amp; Visualization</text>
    
    <!-- Visualization types -->
    <g transform="translate(30, 40)">
      <!-- Heatmap -->
      <rect x="0" y="0" width="80" height="60" fill="#F3E5F5" rx="5" stroke="#7B1FA2"/>
      <g transform="translate(10, 10)">
        <rect x="0" y="0" width="12" height="10" fill="#E53935"/>
        <rect x="14" y="0" width="12" height="10" fill="#1565C0"/>
        <rect x="28" y="0" width="12" height="10" fill="#E53935"/>
        <rect x="42" y="0" width="12" height="10" fill="#FFC107"/>
        <rect x="0" y="12" width="12" height="10" fill="#1565C0"/>
        <rect x="14" y="12" width="12" height="10" fill="#E53935"/>
        <rect x="28" y="12" width="12" height="10" fill="#FFC107"/>
        <rect x="42" y="12" width="12" height="10" fill="#1565C0"/>
        <rect x="0" y="24" width="12" height="10" fill="#FFC107"/>
        <rect x="14" y="24" width="12" height="10" fill="#FFC107"/>
        <rect x="28" y="24" width="12" height="10" fill="#1565C0"/>
        <rect x="42" y="24" width="12" height="10" fill="#E53935"/>
      </g>
      <text x="40" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#7B1FA2">Heatmap</text>
    </g>
    
    <g transform="translate(130, 40)">
      <!-- Volcano -->
      <rect x="0" y="0" width="80" height="60" fill="#FFEBEE" rx="5" stroke="#E53935"/>
      <circle cx="20" cy="35" r="3" fill="#666"/>
      <circle cx="25" cy="28" r="3" fill="#666"/>
      <circle cx="35" cy="40" r="3" fill="#666"/>
      <circle cx="40" cy="32" r="3" fill="#666"/>
      <circle cx="60" cy="15" r="4" fill="#E53935"/>
      <circle cx="55" cy="20" r="4" fill="#E53935"/>
      <circle cx="15" cy="18" r="4" fill="#1565C0"/>
      <circle cx="50" cy="38" r="3" fill="#666"/>
      <line x1="40" y1="5" x2="40" y2="50" stroke="#999" stroke-dasharray="2"/>
      <text x="40" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#E53935">Volcano</text>
    </g>
    
    <g transform="translate(230, 40)">
      <!-- MA plot -->
      <rect x="0" y="0" width="80" height="60" fill="#E3F2FD" rx="5" stroke="#1565C0"/>
      <line x1="5" y1="30" x2="75" y2="30" stroke="#999" stroke-dasharray="2"/>
      <circle cx="15" cy="25" r="2" fill="#1565C0"/>
      <circle cx="25" cy="35" r="2" fill="#E53935"/>
      <circle cx="35" cy="30" r="2" fill="#666"/>
      <circle cx="45" cy="28" r="2" fill="#666"/>
      <circle cx="55" cy="33" r="2" fill="#666"/>
      <circle cx="65" cy="20" r="3" fill="#1565C0"/>
      <text x="40" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1565C0">MA Plot</text>
    </g>
    
    <g transform="translate(330, 40)">
      <!-- PCA -->
      <rect x="0" y="0" width="80" height="60" fill="#E8F5E9" rx="5" stroke="#43A047"/>
      <circle cx="20" cy="20" r="5" fill="#43A047"/>
      <circle cx="25" cy="25" r="5" fill="#43A047"/>
      <circle cx="18" cy="28" r="5" fill="#66BB6A"/>
      <circle cx="55" cy="40" r="5" fill="#FB8C00"/>
      <circle cx="60" cy="35" r="5" fill="#FB8C00"/>
      <circle cx="58" cy="45" r="5" fill="#FFA726"/>
      <text x="40" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#43A047">PCA</text>
    </g>
    
    <!-- Enrichment -->
    <g transform="translate(450, 35)">
      <text x="0" y="10" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Functional Enrichment:</text>
      <text x="10" y="28" font-family="Arial, sans-serif" font-size="9" fill="#666">• GO enrichment</text>
      <text x="10" y="42" font-family="Arial, sans-serif" font-size="9" fill="#666">• KEGG pathways</text>
      <text x="10" y="56" font-family="Arial, sans-serif" font-size="9" fill="#666">• GSEA analysis</text>
      <text x="10" y="70" font-family="Arial, sans-serif" font-size="9" fill="#7B1FA2" font-weight="bold">Tools: clusterProfiler, DAVID</text>
    </g>
  </g>
  
  <!-- Footer -->
  <text x="400" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888">RNA-Seq quantifies gene expression and identifies differentially expressed genes between conditions</text>
</svg>