<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <defs>
    <linearGradient id="shinyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#42A5F5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadowShiny" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F5F5"/>
      <stop offset="100%" style="stop-color:#E0E0E0"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="480" fill="#FAFAFA"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1565C0">Interactive R Shiny Dashboard</text>
  
  <!-- Browser Window Frame -->
  <g transform="translate(30, 50)">
    <rect x="0" y="0" width="480" height="360" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="2" rx="8" filter="url(#shadowShiny)"/>
    
    <!-- Browser toolbar -->
    <rect x="0" y="0" width="480" height="30" fill="url(#browserGrad)" rx="8"/>
    <rect x="0" y="22" width="480" height="8" fill="url(#browserGrad)"/>
    
    <!-- Browser controls -->
    <circle cx="18" cy="15" r="6" fill="#FF5252"/>
    <circle cx="38" cy="15" r="6" fill="#FFD740"/>
    <circle cx="58" cy="15" r="6" fill="#69F0AE"/>
    
    <!-- URL bar -->
    <rect x="80" y="8" width="350" height="14" fill="white" stroke="#DDD" rx="3"/>
    <text x="90" y="18" font-family="Arial, sans-serif" font-size="8" fill="#666">https://myapp.shinyapps.io/bioinformatics</text>
    
    <!-- App content area -->
    <rect x="10" y="40" width="460" height="310" fill="white" stroke="#E0E0E0"/>
    
    <!-- App header -->
    <rect x="10" y="40" width="460" height="35" fill="#1565C0"/>
    <text x="30" y="62" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">🧬 Gene Expression Explorer</text>
    <rect x="380" y="50" width="80" height="18" fill="white" rx="3" opacity="0.2"/>
    <text x="420" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">Download</text>
    
    <!-- Sidebar -->
    <rect x="10" y="75" width="130" height="275" fill="#F5F5F5" stroke="#E0E0E0"/>
    <text x="75" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Controls</text>
    
    <!-- Select input -->
    <text x="20" y="115" font-family="Arial, sans-serif" font-size="8" fill="#333">Select Gene:</text>
    <rect x="20" y="120" width="110" height="20" fill="white" stroke="#1565C0" rx="3"/>
    <text x="28" y="133" font-family="Arial, sans-serif" font-size="9" fill="#333">TP53</text>
    <polygon points="118,128 124,128 121,134" fill="#666"/>
    
    <!-- Slider input -->
    <text x="20" y="160" font-family="Arial, sans-serif" font-size="8" fill="#333">Log2FC Cutoff:</text>
    <rect x="20" y="168" width="110" height="6" fill="#E0E0E0" rx="2"/>
    <rect x="20" y="168" width="60" height="6" fill="#1565C0" rx="2"/>
    <circle cx="80" cy="171" r="6" fill="#1565C0" stroke="white" stroke-width="2"/>
    <text x="75" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666">1.5</text>
    
    <!-- Checkbox group -->
    <text x="20" y="210" font-family="Arial, sans-serif" font-size="8" fill="#333">Sample Types:</text>
    <rect x="20" y="218" width="12" height="12" fill="#1565C0" rx="2"/>
    <text x="38" y="228" font-family="Arial, sans-serif" font-size="8" fill="#333">☑ Tumor</text>
    <rect x="20" y="235" width="12" height="12" fill="#1565C0" rx="2"/>
    <text x="38" y="245" font-family="Arial, sans-serif" font-size="8" fill="#333">☑ Normal</text>
    <rect x="20" y="252" width="12" height="12" fill="white" stroke="#CCC" rx="2"/>
    <text x="38" y="262" font-family="Arial, sans-serif" font-size="8" fill="#333">☐ Metastatic</text>
    
    <!-- Action button -->
    <rect x="20" y="280" width="110" height="28" fill="#43A047" rx="5"/>
    <text x="75" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white" font-weight="bold">Run Analysis</text>
    
    <!-- Reset button -->
    <rect x="20" y="315" width="110" height="22" fill="#FF7043" rx="3"/>
    <text x="75" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Reset</text>
    
    <!-- Main panel - Tab navigation -->
    <rect x="140" y="75" width="330" height="30" fill="#E3F2FD"/>
    <rect x="145" y="80" width="70" height="22" fill="#1565C0" rx="3"/>
    <text x="180" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white" font-weight="bold">Volcano</text>
    <rect x="220" y="80" width="70" height="22" fill="white" stroke="#1565C0" rx="3"/>
    <text x="255" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1565C0">Heatmap</text>
    <rect x="295" y="80" width="70" height="22" fill="white" stroke="#1565C0" rx="3"/>
    <text x="330" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1565C0">Table</text>
    <rect x="370" y="80" width="70" height="22" fill="white" stroke="#1565C0" rx="3"/>
    <text x="405" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1565C0">Network</text>
    
    <!-- Main content area - Volcano plot -->
    <rect x="145" y="110" width="320" height="230" fill="#FAFAFA" stroke="#E0E0E0"/>
    
    <!-- Plot axes -->
    <line x1="180" y1="110" x2="180" y2="320" stroke="#333" stroke-width="1"/>
    <line x1="180" y1="220" x2="460" y2="220" stroke="#333" stroke-width="1"/>
    
    <!-- Axis labels -->
    <text x="320" y="337" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">log₂(Fold Change)</text>
    <text x="155" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333" transform="rotate(-90, 155, 215)">-log₁₀(p-value)</text>
    
    <!-- Significance threshold line -->
    <line x1="180" y1="150" x2="460" y2="150" stroke="#E53935" stroke-width="1" stroke-dasharray="3,2"/>
    
    <!-- Fold change threshold lines -->
    <line x1="250" y1="115" x2="250" y2="315" stroke="#1565C0" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="390" y1="115" x2="390" y2="315" stroke="#1565C0" stroke-width="1" stroke-dasharray="3,2"/>
    
    <!-- Data points - non-significant (grey) -->
    <circle cx="270" cy="280" r="3" fill="#9E9E9E" opacity="0.5"/>
    <circle cx="310" cy="260" r="3" fill="#9E9E9E" opacity="0.5"/>
    <circle cx="350" cy="275" r="3" fill="#9E9E9E" opacity="0.5"/>
    <circle cx="290" cy="250" r="3" fill="#9E9E9E" opacity="0.5"/>
    <circle cx="330" cy="240" r="3" fill="#9E9E9E" opacity="0.5"/>
    <circle cx="360" cy="255" r="3" fill="#9E9E9E" opacity="0.5"/>
    <circle cx="280" cy="230" r="3" fill="#9E9E9E" opacity="0.5"/>
    <circle cx="300" cy="245" r="3" fill="#9E9E9E" opacity="0.5"/>
    <circle cx="340" cy="265" r="3" fill="#9E9E9E" opacity="0.5"/>
    <circle cx="375" cy="235" r="3" fill="#9E9E9E" opacity="0.5"/>
    
    <!-- Data points - significant up (red) -->
    <circle cx="420" cy="140" r="4" fill="#E53935"/>
    <circle cx="435" cy="125" r="5" fill="#E53935"/>
    <circle cx="410" cy="160" r="4" fill="#E53935"/>
    <circle cx="440" cy="155" r="3.5" fill="#E53935"/>
    <circle cx="425" cy="175" r="3" fill="#E53935"/>
    <circle cx="448" cy="145" r="4" fill="#E53935"/>
    
    <!-- Data points - significant down (blue) -->
    <circle cx="200" cy="135" r="4" fill="#1565C0"/>
    <circle cx="215" cy="145" r="5" fill="#1565C0"/>
    <circle cx="190" cy="160" r="4" fill="#1565C0"/>
    <circle cx="225" cy="120" r="4.5" fill="#1565C0"/>
    <circle cx="205" cy="180" r="3" fill="#1565C0"/>
    
    <!-- Gene label -->
    <line x1="435" y1="125" x2="445" y2="115" stroke="#E53935" stroke-width="1"/>
    <text x="448" y="115" font-family="Arial, sans-serif" font-size="7" fill="#E53935" font-weight="bold">TP53</text>
    <line x1="225" y1="120" x2="218" y2="112" stroke="#1565C0" stroke-width="1"/>
    <text x="218" y="110" text-anchor="end" font-family="Arial, sans-serif" font-size="7" fill="#1565C0" font-weight="bold">BRCA1</text>
  </g>
  
  <!-- Architecture diagram -->
  <g transform="translate(530, 50)">
    <rect x="0" y="0" width="240" height="175" fill="white" stroke="#8E24AA" stroke-width="2" rx="10" filter="url(#shadowShiny)"/>
    <rect x="0" y="0" width="240" height="25" fill="#8E24AA" rx="10"/>
    <rect x="0" y="17" width="240" height="8" fill="#8E24AA"/>
    <text x="120" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Shiny Architecture</text>
    
    <!-- UI Box -->
    <rect x="20" y="40" width="80" height="55" fill="#E3F2FD" stroke="#1565C0" rx="5"/>
    <text x="60" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1565C0">UI</text>
    <text x="60" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">fluidPage()</text>
    <text x="60" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">sidebarLayout()</text>
    
    <!-- Arrows -->
    <line x1="100" y1="55" x2="140" y2="55" stroke="#8E24AA" stroke-width="2" marker-end="url(#arrowShiny)"/>
    <line x1="140" y1="80" x2="100" y2="80" stroke="#8E24AA" stroke-width="2" marker-end="url(#arrowShiny)"/>
    <text x="120" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#8E24AA">input$</text>
    <text x="120" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#8E24AA">output$</text>
    
    <!-- Server Box -->
    <rect x="140" y="40" width="80" height="55" fill="#E8F5E9" stroke="#43A047" rx="5"/>
    <text x="180" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#43A047">Server</text>
    <text x="180" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">reactive()</text>
    <text x="180" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">observe()</text>
    
    <!-- Reactive flow -->
    <rect x="60" y="110" width="120" height="50" fill="#FFF3E0" stroke="#FB8C00" rx="5"/>
    <text x="120" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#FB8C00">Reactivity</text>
    <text x="120" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">Input changes → Server</text>
    <text x="120" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">→ Output updates</text>
  </g>
  
  <!-- Key Components -->
  <g transform="translate(530, 240)">
    <rect x="0" y="0" width="240" height="170" fill="white" stroke="#43A047" stroke-width="2" rx="10" filter="url(#shadowShiny)"/>
    <rect x="0" y="0" width="240" height="25" fill="#43A047" rx="10"/>
    <rect x="0" y="17" width="240" height="8" fill="#43A047"/>
    <text x="120" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Key Components</text>
    
    <g transform="translate(15, 35)">
      <text x="0" y="12" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1565C0">Input Widgets:</text>
      <text x="80" y="12" font-family="Arial, sans-serif" font-size="8" fill="#666">selectInput, sliderInput</text>
      <text x="80" y="24" font-family="Arial, sans-serif" font-size="8" fill="#666">checkboxGroup, actionButton</text>
      
      <text x="0" y="45" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#43A047">Output Renderers:</text>
      <text x="95" y="45" font-family="Arial, sans-serif" font-size="8" fill="#666">renderPlot, renderTable</text>
      <text x="95" y="57" font-family="Arial, sans-serif" font-size="8" fill="#666">renderText, renderUI</text>
      
      <text x="0" y="78" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#FB8C00">Enhanced:</text>
      <text x="60" y="78" font-family="Arial, sans-serif" font-size="8" fill="#666">plotly, DT, leaflet</text>
      
      <text x="0" y="98" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#8E24AA">Layouts:</text>
      <text x="50" y="98" font-family="Arial, sans-serif" font-size="8" fill="#666">navbarPage, tabsetPanel</text>
      <text x="50" y="110" font-family="Arial, sans-serif" font-size="8" fill="#666">fluidRow, column</text>
      
      <text x="0" y="130" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#E53935">Deploy:</text>
      <text x="45" y="130" font-family="Arial, sans-serif" font-size="8" fill="#666">shinyapps.io, Shiny Server</text>
    </g>
  </g>
  
  <!-- Bioinformatics Use Cases -->
  <g transform="translate(30, 425)">
    <rect x="0" y="0" width="740" height="45" fill="white" stroke="#5C6BC0" stroke-width="2" rx="10" filter="url(#shadowShiny)"/>
    <text x="20" y="18" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#5C6BC0">Bioinformatics Applications:</text>
    <text x="165" y="18" font-family="Arial, sans-serif" font-size="9" fill="#666">Gene expression viewer • Pathway explorer • Variant browser • NGS QC dashboard</text>
    <text x="20" y="35" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#5C6BC0">Popular packages:</text>
    <text x="130" y="35" font-family="Arial, sans-serif" font-size="9" fill="#666">shinydashboard • shinyWidgets • ggplot2 • plotly • DT • visNetwork • Bioconductor</text>
  </g>
</svg>