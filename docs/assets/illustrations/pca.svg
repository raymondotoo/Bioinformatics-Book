<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="pcaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5C6BC0"/>
      <stop offset="100%" style="stop-color:#7986CB"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="axisArrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#37474F"/>
    </marker>
  </defs>
  
  <rect width="100%" height="100%" fill="#FAFAFA" rx="12"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="26" font-weight="700" fill="#303F9F">Principal Component Analysis (PCA)</text>
  <text x="450" y="65" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="13" fill="#5C6BC0">Dimensionality Reduction for High-Dimensional Biological Data</text>
  
  <!-- Main PCA Plot -->
  <g transform="translate(80, 100)" filter="url(#shadow)">
    <rect width="400" height="340" rx="10" fill="white" stroke="#E0E0E0"/>
    
    <!-- Axes -->
    <line x1="50" y1="290" x2="370" y2="290" stroke="#37474F" stroke-width="2" marker-end="url(#axisArrow)"/>
    <line x1="50" y1="290" x2="50" y2="30" stroke="#37474F" stroke-width="2" marker-end="url(#axisArrow)"/>
    
    <text x="210" y="325" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="14" font-weight="600" fill="#37474F">PC1 (45.2% variance)</text>
    <text x="20" y="160" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="14" font-weight="600" fill="#37474F" transform="rotate(-90, 20, 160)">PC2 (23.8% variance)</text>
    
    <!-- Grid lines -->
    <g stroke="#ECEFF1" stroke-width="1">
      <line x1="50" y1="50" x2="360" y2="50"/>
      <line x1="50" y1="110" x2="360" y2="110"/>
      <line x1="50" y1="170" x2="360" y2="170"/>
      <line x1="50" y1="230" x2="360" y2="230"/>
      <line x1="110" y1="30" x2="110" y2="290"/>
      <line x1="170" y1="30" x2="170" y2="290"/>
      <line x1="230" y1="30" x2="230" y2="290"/>
      <line x1="290" y1="30" x2="290" y2="290"/>
      <line x1="350" y1="30" x2="350" y2="290"/>
    </g>
    
    <!-- Cluster 1 (Red - Disease) -->
    <g fill="#E53935" opacity="0.8">
      <circle cx="280" cy="80" r="10"/>
      <circle cx="300" cy="95" r="10"/>
      <circle cx="290" cy="110" r="10"/>
      <circle cx="320" cy="85" r="10"/>
      <circle cx="310" cy="100" r="10"/>
      <circle cx="330" cy="95" r="10"/>
      <circle cx="305" cy="70" r="10"/>
      <circle cx="295" cy="120" r="10"/>
      <circle cx="340" cy="105" r="10"/>
      <circle cx="285" cy="90" r="10"/>
    </g>
    
    <!-- Cluster 2 (Blue - Control) -->
    <g fill="#1E88E5" opacity="0.8">
      <circle cx="100" cy="220" r="10"/>
      <circle cx="120" cy="235" r="10"/>
      <circle cx="110" cy="250" r="10"/>
      <circle cx="130" cy="225" r="10"/>
      <circle cx="140" cy="240" r="10"/>
      <circle cx="95" cy="245" r="10"/>
      <circle cx="125" cy="210" r="10"/>
      <circle cx="145" cy="255" r="10"/>
      <circle cx="155" cy="235" r="10"/>
      <circle cx="115" cy="265" r="10"/>
    </g>
    
    <!-- Cluster 3 (Green - Treatment) -->
    <g fill="#43A047" opacity="0.8">
      <circle cx="200" cy="150" r="10"/>
      <circle cx="185" cy="165" r="10"/>
      <circle cx="215" cy="140" r="10"/>
      <circle cx="195" cy="175" r="10"/>
      <circle cx="225" cy="155" r="10"/>
      <circle cx="210" cy="165" r="10"/>
      <circle cx="190" cy="145" r="10"/>
      <circle cx="230" cy="170" r="10"/>
    </g>
    
    <!-- Confidence ellipses -->
    <ellipse cx="305" cy="95" rx="45" ry="35" fill="none" stroke="#E53935" stroke-width="2" stroke-dasharray="5,3" opacity="0.6"/>
    <ellipse cx="120" cy="240" rx="40" ry="35" fill="none" stroke="#1E88E5" stroke-width="2" stroke-dasharray="5,3" opacity="0.6"/>
    <ellipse cx="205" cy="155" rx="35" ry="25" fill="none" stroke="#43A047" stroke-width="2" stroke-dasharray="5,3" opacity="0.6"/>
  </g>
  
  <!-- Legend -->
  <g transform="translate(500, 110)" filter="url(#shadow)">
    <rect width="180" height="120" rx="8" fill="white" stroke="#E0E0E0"/>
    <text x="90" y="25" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="13" font-weight="600" fill="#37474F">Sample Groups</text>
    <line x1="15" y1="38" x2="165" y2="38" stroke="#E0E0E0"/>
    
    <circle cx="30" cy="58" r="8" fill="#E53935"/>
    <text x="50" y="62" font-family="'Segoe UI', Arial" font-size="12" fill="#37474F">Disease (n=10)</text>
    
    <circle cx="30" cy="82" r="8" fill="#1E88E5"/>
    <text x="50" y="86" font-family="'Segoe UI', Arial" font-size="12" fill="#37474F">Control (n=10)</text>
    
    <circle cx="30" cy="106" r="8" fill="#43A047"/>
    <text x="50" y="110" font-family="'Segoe UI', Arial" font-size="12" fill="#37474F">Treatment (n=8)</text>
  </g>
  
  <!-- Scree Plot -->
  <g transform="translate(500, 250)" filter="url(#shadow)">
    <rect width="180" height="140" rx="8" fill="white" stroke="#E0E0E0"/>
    <text x="90" y="22" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="12" font-weight="600" fill="#37474F">Variance Explained</text>
    <line x1="15" y1="35" x2="165" y2="35" stroke="#E0E0E0"/>
    
    <!-- Bar chart -->
    <g transform="translate(25, 50)">
      <rect x="0" y="0" width="25" height="65" rx="3" fill="#5C6BC0"/>
      <text x="12" y="80" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="9" fill="#37474F">PC1</text>
      <text x="12" y="-5" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="8" fill="#5C6BC0">45%</text>
      
      <rect x="35" y="30" width="25" height="35" rx="3" fill="#7986CB"/>
      <text x="47" y="80" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="9" fill="#37474F">PC2</text>
      <text x="47" y="25" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="8" fill="#7986CB">24%</text>
      
      <rect x="70" y="45" width="25" height="20" rx="3" fill="#9FA8DA"/>
      <text x="82" y="80" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="9" fill="#37474F">PC3</text>
      <text x="82" y="40" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="8" fill="#9FA8DA">14%</text>
      
      <rect x="105" y="52" width="25" height="13" rx="3" fill="#C5CAE9"/>
      <text x="117" y="80" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="9" fill="#37474F">PC4</text>
      <text x="117" y="47" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="8" fill="#9FA8DA">9%</text>
    </g>
  </g>
  
  <!-- Process Panel -->
  <g transform="translate(700, 110)" filter="url(#shadow)">
    <rect width="170" height="280" rx="10" fill="#E8EAF6"/>
    <text x="85" y="28" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="14" font-weight="600" fill="#303F9F">PCA Steps</text>
    <line x1="15" y1="42" x2="155" y2="42" stroke="#C5CAE9"/>
    
    <g transform="translate(20, 60)">
      <circle cx="12" cy="0" r="12" fill="#5C6BC0"/>
      <text x="12" y="5" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="10" font-weight="600" fill="white">1</text>
      <text x="35" y="5" font-family="'Segoe UI', Arial" font-size="11" fill="#37474F">Standardize data</text>
      
      <circle cx="12" cy="45" r="12" fill="#5C6BC0"/>
      <text x="12" y="50" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="10" font-weight="600" fill="white">2</text>
      <text x="35" y="50" font-family="'Segoe UI', Arial" font-size="11" fill="#37474F">Covariance matrix</text>
      
      <circle cx="12" cy="90" r="12" fill="#5C6BC0"/>
      <text x="12" y="95" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="10" font-weight="600" fill="white">3</text>
      <text x="35" y="95" font-family="'Segoe UI', Arial" font-size="11" fill="#37474F">Eigendecomposition</text>
      
      <circle cx="12" cy="135" r="12" fill="#5C6BC0"/>
      <text x="12" y="140" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="10" font-weight="600" fill="white">4</text>
      <text x="35" y="140" font-family="'Segoe UI', Arial" font-size="11" fill="#37474F">Select top PCs</text>
      
      <circle cx="12" cy="180" r="12" fill="#5C6BC0"/>
      <text x="12" y="185" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="10" font-weight="600" fill="white">5</text>
      <text x="35" y="185" font-family="'Segoe UI', Arial" font-size="11" fill="#37474F">Project data</text>
    </g>
  </g>
  
  <!-- Tools Panel -->
  <g transform="translate(700, 400)">
    <rect width="170" height="45" rx="6" fill="#C5CAE9"/>
    <text x="85" y="18" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="11" font-weight="600" fill="#303F9F">Tools</text>
    <text x="85" y="35" text-anchor="middle" font-family="'Courier New'" font-size="9" fill="#37474F">prcomp() | PCA() | sklearn</text>
  </g>
  
  <!-- Footer -->
  <g transform="translate(80, 460)">
    <rect width="590" height="30" rx="6" fill="#ECEFF1"/>
    <text x="295" y="20" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="11" fill="#546E7A">PCA reduces dimensions while maximizing variance | Unsupervised | Linear transformation</text>
  </g>
</svg>
