        <text x="9" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#43A047">|</text>
        <text x="29" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#43A047">|</text>
        <text x="49" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#43A047">|</text>
        <text x="69" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#43A047">|</text>
        <text x="89" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#43A047">|</text>
        <text x="109" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#43A047">|</text>
      </g>
      
      <text x="0" y="35" font-family="Arial, sans-serif" font-size="10" fill="#999">...TGCA</text>
      <g transform="translate(35, 20)">
        <rect x="0" y="0" width="18" height="22" fill="#E0E0E0" rx="2"/>
        <text x="9" y="16" text-anchor="middle" font-family="monospace" font-size="10" fill="#999">C</text>
        <rect x="20" y="0" width="18" height="22" fill="#E0E0E0" rx="2"/>
        <text x="29" y="16" text-anchor="middle" font-family="monospace" font-size="10" fill="#999">T</text>
        
        <rect x="45" y="0" width="18" height="22" fill="#66BB6A" rx="2"/>
        <text x="54" y="16" text-anchor="middle" font-family="monospace" font-size="10" fill="white">G</text>
        <rect x="65" y="0" width="18" height="22" fill="#66BB6A" rx="2"/>
        <text x="74" y="16" text-anchor="middle" font-family="monospace" font-size="10" fill="white">A</text>
        <rect x="85" y="0" width="18" height="22" fill="#66BB6A" rx="2"/>
        <text x="94" y="16" text-anchor="middle" font-family="monospace" font-size="10" fill="white">T</text>
        <rect x="105" y="0" width="18" height="22" fill="#66BB6A" rx="2"/>
        <text x="114" y="16" text-anchor="middle" font-family="monospace" font-size="10" fill="white">T</text>
        <rect x="125" y="0" width="18" height="22" fill="#66BB6A" rx="2"/>
        <text x="134" y="16" text-anchor="middle" font-family="monospace" font-size="10" fill="white">C</text>
        <rect x="145" y="0" width="18" height="22" fill="#66BB6A" rx="2"/>
        <text x="154" y="16" text-anchor="middle" font-family="monospace" font-size="10" fill="white">A</text>
        
        <rect x="185" y="0" width="18" height="22" fill="#E0E0E0" rx="2"/>
        <text x="194" y="16" text-anchor="middle" font-family="monospace" font-size="10" fill="#999">A</text>
        <rect x="205" y="0" width="18" height="22" fill="#E0E0E0" rx="2"/>
        <text x="214" y="16" text-anchor="middle" font-family="monospace" font-size="10" fill="#999">C</text>
      </g>
      <text x="265" y="35" font-family="Arial, sans-serif" font-size="10" fill="#999">TAC...</text>
    </g>
    
    <!-- Description -->
    <text x="165" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">Finds best matching regions (HSPs)</text>
    
    <!-- Use case -->
    <rect x="40" y="155" width="250" height="25" fill="#E8F5E9" rx="5"/>
    <text x="165" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2E7D32">🔍 Finding conserved domains &amp; motifs</text>
    
    <text x="165" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#43A047" font-weight="bold">Best for: database searches, domains</text>
  </g>
  
  <!-- Multiple Sequence Alignment -->
  <g transform="translate(100, 280)">
    <rect x="0" y="0" width="600" height="190" fill="white" stroke="#7B1FA2" stroke-width="2" rx="10" filter="url(#shadowAlign)"/>
    <rect x="0" y="0" width="600" height="35" fill="#7B1FA2" rx="10"/>
    <rect x="0" y="27" width="600" height="8" fill="#7B1FA2"/>
    <text x="300" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Multiple Sequence Alignment (MSA)</text>
    
    <!-- MSA visualization -->
    <g transform="translate(30, 55)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#666">Human:</text>
      <text x="60" y="0" font-family="monospace" font-size="11" fill="#333">MVLSPADKTNVKAAWGKVGAHAGEYGAEALERM</text>
      
      <text x="0" y="20" font-family="Arial, sans-serif" font-size="10" fill="#666">Mouse:</text>
      <text x="60" y="20" font-family="monospace" font-size="11" fill="#333">MVLSGEDKSNIKAAWGKIGGHGAEYGAEALERM</text>
      
      <text x="0" y="40" font-family="Arial, sans-serif" font-size="10" fill="#666">Chicken:</text>
      <text x="60" y="40" font-family="monospace" font-size="11" fill="#333">MVLSAADKNNVKGIFGKISSHAEDYGAEALERM</text>
      
      <text x="0" y="60" font-family="Arial, sans-serif" font-size="10" fill="#666">Fish:</text>
      <text x="60" y="60" font-family="monospace" font-size="11" fill="#333">MSLSDKDKAAVRALWSKIGKSADAIGNDALSRM</text>
      
      <!-- Conservation bar -->
      <text x="0" y="85" font-family="Arial, sans-serif" font-size="10" fill="#7B1FA2" font-weight="bold">Conservation:</text>
      <rect x="60" y="75" width="10" height="12" fill="#7B1FA2" rx="1"/>
      <rect x="72" y="78" width="10" height="9" fill="#AB47BC" rx="1"/>
      <rect x="84" y="75" width="10" height="12" fill="#7B1FA2" rx="1"/>
      <rect x="96" y="78" width="10" height="9" fill="#AB47BC" rx="1"/>
      <rect x="108" y="80" width="10" height="7" fill="#CE93D8" rx="1"/>
      <rect x="120" y="82" width="10" height="5" fill="#E1BEE7" rx="1"/>
      <rect x="132" y="80" width="10" height="7" fill="#CE93D8" rx="1"/>
      <rect x="144" y="78" width="10" height="9" fill="#AB47BC" rx="1"/>
      <rect x="156" y="80" width="10" height="7" fill="#CE93D8" rx="1"/>
      <rect x="168" y="82" width="10" height="5" fill="#E1BEE7" rx="1"/>
      <rect x="180" y="78" width="10" height="9" fill="#AB47BC" rx="1"/>
