<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="seq1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#42A5F5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="seq2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43A047;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#66BB6A;stop-opacity:1" />
    </linearGradient>
    <filter id="shadowAlign" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#FAFAFA"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1565C0">Sequence Alignment</text>
  
  <!-- Global Alignment Section -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="330" height="200" fill="white" stroke="#1565C0" stroke-width="2" rx="10" filter="url(#shadowAlign)"/>
    <rect x="0" y="0" width="330" height="35" fill="url(#seq1Grad)" rx="10"/>
    <rect x="0" y="27" width="330" height="8" fill="url(#seq1Grad)"/>
    <text x="165" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Global Alignment</text>
    <text x="165" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">(Needleman-Wunsch)</text>
    
    <!-- Sequences -->
    <g transform="translate(20, 75)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="11" fill="#666">Seq 1:</text>
      <g transform="translate(45, -15)">
        <rect x="0" y="0" width="22" height="22" fill="#1565C0" rx="2"/>
        <text x="11" y="16" text-anchor="middle" font-family="monospace" font-size="12" fill="white">G</text>
        <rect x="25" y="0" width="22" height="22" fill="#1565C0" rx="2"/>
        <text x="36" y="16" text-anchor="middle" font-family="monospace" font-size="12" fill="white">A</text>
        <rect x="50" y="0" width="22" height="22" fill="#1565C0" rx="2"/>
        <text x="61" y="16" text-anchor="middle" font-family="monospace" font-size="12" fill="white">T</text>
        <rect x="75" y="0" width="22" height="22" fill="#1565C0" rx="2"/>
        <text x="86" y="16" text-anchor="middle" font-family="monospace" font-size="12" fill="white">T</text>
        <rect x="100" y="0" width="22" height="22" fill="#1565C0" rx="2"/>
        <text x="111" y="16" text-anchor="middle" font-family="monospace" font-size="12" fill="white">A</text>
        <rect x="125" y="0" width="22" height="22" fill="#1565C0" rx="2"/>
        <text x="136" y="16" text-anchor="middle" font-family="monospace" font-size="12" fill="white">C</text>
        <rect x="150" y="0" width="22" height="22" fill="#1565C0" rx="2"/>
        <text x="161" y="16" text-anchor="middle" font-family="monospace" font-size="12" fill="white">A</text>
        <rect x="175" y="0" width="22" height="22" fill="#42A5F5" rx="2"/>
        <text x="186" y="16" text-anchor="middle" font-family="monospace" font-size="12" fill="white">-</text>
        <rect x="200" y="0" width="22" height="22" fill="#1565C0" rx="2"/>
        <text x="211" y="16" text-anchor="middle" font-family="monospace" font-size="12" fill="white">G</text>
      </g>
      
      <!-- Match indicators -->
      <g transform="translate(45, 12)">
        <text x="11" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#43A047">|</text>
        <text x="36" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#43A047">|</text>
        <text x="61" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#43A047">|</text>
        <text x="86" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#43A047">|</text>
        <text x="111" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#E53935">×</text>
        <text x="136" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#43A047">|</text>
        <text x="161" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#43A047">|</text>
        <text x="186" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FB8C00">-</text>
        <text x="211" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#43A047">|</text>
      </g>
      
      <text x="0" y="35" font-family="Arial, sans-serif" font-size="11" fill="#666">Seq 2:</text>
      <g transform="translate(45, 20)">
        <rect x="0" y="0" width="22" height="22" fill="#43A047" rx="2"/>
        <text x="11" y="16" text-anchor="middle" font-family="monospace" font-size="12" fill="white">G</text>
        <rect x="25" y="0" width="22" height="22" fill="#43A047" rx="2"/>
        <text x="36" y="16" text-anchor="middle" font-family="monospace" font-size="12" fill="white">A</text>
        <rect x="50" y="0" width="22" height="22" fill="#43A047" rx="2"/>
        <text x="61" y="16" text-anchor="middle" font-family="monospace" font-size="12" fill="white">T</text>
        <rect x="75" y="0" width="22" height="22" fill="#43A047" rx="2"/>
        <text x="86" y="16" text-anchor="middle" font-family="monospace" font-size="12" fill="white">T</text>
        <rect x="100" y="0" width="22" height="22" fill="#E53935" rx="2"/>
        <text x="111" y="16" text-anchor="middle" font-family="monospace" font-size="12" fill="white">G</text>
        <rect x="125" y="0" width="22" height="22" fill="#43A047" rx="2"/>
        <text x="136" y="16" text-anchor="middle" font-family="monospace" font-size="12" fill="white">C</text>
        <rect x="150" y="0" width="22" height="22" fill="#43A047" rx="2"/>
        <text x="161" y="16" text-anchor="middle" font-family="monospace" font-size="12" fill="white">A</text>
        <rect x="175" y="0" width="22" height="22" fill="#FB8C00" rx="2"/>
        <text x="186" y="16" text-anchor="middle" font-family="monospace" font-size="12" fill="white">T</text>
        <rect x="200" y="0" width="22" height="22" fill="#43A047" rx="2"/>
        <text x="211" y="16" text-anchor="middle" font-family="monospace" font-size="12" fill="white">G</text>
      </g>
    </g>
    
    <!-- Description -->
    <text x="165" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">Aligns entire length of both sequences</text>
    
    <!-- Legend -->
    <g transform="translate(40, 155)">
      <rect x="0" y="0" width="15" height="15" fill="#43A047" rx="2"/>
      <text x="20" y="12" font-family="Arial, sans-serif" font-size="9" fill="#666">Match</text>
      
      <rect x="70" y="0" width="15" height="15" fill="#E53935" rx="2"/>
      <text x="90" y="12" font-family="Arial, sans-serif" font-size="9" fill="#666">Mismatch</text>
      
      <rect x="155" y="0" width="15" height="15" fill="#FB8C00" rx="2"/>
      <text x="175" y="12" font-family="Arial, sans-serif" font-size="9" fill="#666">Gap/Insertion</text>
    </g>
    
    <text x="165" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1565C0" font-weight="bold">Best for: similar-length sequences</text>
  </g>
  
  <!-- Local Alignment Section -->
  <g transform="translate(420, 60)">
    <rect x="0" y="0" width="330" height="200" fill="white" stroke="#43A047" stroke-width="2" rx="10" filter="url(#shadowAlign)"/>
