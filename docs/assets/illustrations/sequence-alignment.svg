        <text x="9" y="16" text-anchor="middle" font-family="monospace" font-size="10" fill="#999">A</text>
        <rect x="20" y="0" width="18" height="22" fill="#E0E0E0" rx="2"/>
        <text x="29" y="16" text-anchor="middle" font-family="monospace" font-size="10" fill="#999">C</text>
        
        <!-- Highlighted region -->
        <rect x="40" y="-3" width="140" height="28" fill="none" stroke="#43A047" stroke-width="3" stroke-dasharray="4" rx="5"/>
        
        <rect x="45" y="0" width="18" height="22" fill="#43A047" rx="2"/>
        <text x="54" y="16" text-anchor="middle" font-family="monospace" font-size="10" fill="white">G</text>
        <rect x="65" y="0" width="18" height="22" fill="#43A047" rx="2"/>
        <text x="74" y="16" text-anchor="middle" font-family="monospace" font-size="10" fill="white">A</text>
        <rect x="85" y="0" width="18" height="22" fill="#43A047" rx="2"/>
        <text x="94" y="16" text-anchor="middle" font-family="monospace" font-size="10" fill="white">T</text>
        <rect x="105" y="0" width="18" height="22" fill="#43A047" rx="2"/>
        <text x="114" y="16" text-anchor="middle" font-family="monospace" font-size="10" fill="white">T</text>
        <rect x="125" y="0" width="18" height="22" fill="#43A047" rx="2"/>
        <text x="134" y="16" text-anchor="middle" font-family="monospace" font-size="10" fill="white">C</text>
        <rect x="145" y="0" width="18" height="22" fill="#43A047" rx="2"/>
        <text x="154" y="16" text-anchor="middle" font-family="monospace" font-size="10" fill="white">A</text>
        
        <rect x="185" y="0" width="18" height="22" fill="#E0E0E0" rx="2"/>
        <text x="194" y="16" text-anchor="middle" font-family="monospace" font-size="10" fill="#999">T</text>
        <rect x="205" y="0" width="18" height="22" fill="#E0E0E0" rx="2"/>
        <text x="214" y="16" text-anchor="middle" font-family="monospace" font-size="10" fill="#999">G</text>
      </g>
      <text x="265" y="0" font-family="Arial, sans-serif" font-size="10" fill="#999">CGT...</text>
      
      <!-- Match indicators -->
