      <rect x="252" y="82" width="10" height="5" fill="#E1BEE7" rx="1"/>
      
      <text x="300" y="85" font-family="Arial, sans-serif" font-size="9" fill="#666">█ High  ▄ Medium  ▂ Low</text>
    </g>
    
    <!-- Tools -->
    <g transform="translate(30, 145)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="11" fill="#333" font-weight="bold">Tools:</text>
      <rect x="50" y="-12" width="70" height="20" fill="#E8F5E9" stroke="#43A047" rx="4"/>
      <text x="85" y="3" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2E7D32">ClustalW</text>
      
      <rect x="130" y="-12" width="70" height="20" fill="#E3F2FD" stroke="#1565C0" rx="4"/>
      <text x="165" y="3" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1565C0">MUSCLE</text>
      
      <rect x="210" y="-12" width="70" height="20" fill="#FFF3E0" stroke="#FB8C00" rx="4"/>
      <text x="245" y="3" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#E65100">MAFFT</text>
      
      <rect x="290" y="-12" width="70" height="20" fill="#F3E5F5" stroke="#7B1FA2" rx="4"/>
      <text x="325" y="3" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7B1FA2">T-Coffee</text>
      
      <text x="400" y="0" font-family="Arial, sans-serif" font-size="10" fill="#666">→ Phylogenetics, Conservation analysis</text>
    </g>
  </g>
  
  <!-- Footer -->
  <text x="400" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888">Sequence alignment is fundamental to comparative genomics, homology detection, and evolutionary analysis</text>
