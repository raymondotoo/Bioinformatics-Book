    <text x="165" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">(Smith-Waterman / BLAST)</text>
    
    <!-- Full sequences -->
    <g transform="translate(20, 75)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#999">...ACGT</text>
