<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="msGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00897B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#26A69A;stop-opacity:1" />
    </linearGradient>
    <filter id="shadowMS" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#FAFAFA"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#00897B">Mass Spectrometry in Proteomics</text>
  
  <!-- Sample Preparation -->
  <g transform="translate(30, 70)">
    <rect x="0" y="0" width="140" height="160" fill="white" stroke="#7B1FA2" stroke-width="2" rx="10" filter="url(#shadowMS)"/>
    <rect x="0" y="0" width="140" height="28" fill="#7B1FA2" rx="10"/>
    <rect x="0" y="20" width="140" height="8" fill="#7B1FA2"/>
    <text x="70" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">1. Sample Prep</text>
    
    <!-- Protein extraction -->
    <g transform="translate(20, 40)">
      <ellipse cx="50" cy="20" rx="40" ry="15" fill="#E1BEE7"/>
      <text x="50" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#4A148C">Protein Extract</text>
    </g>
    
    <!-- Digestion -->
    <text x="70" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">↓ Trypsin digestion</text>
    
    <!-- Peptides -->
    <g transform="translate(20, 100)">
      <rect x="0" y="0" width="30" height="8" fill="#AB47BC" rx="2"/>
      <rect x="35" y="0" width="25" height="8" fill="#CE93D8" rx="2"/>
      <rect x="65" y="0" width="35" height="8" fill="#AB47BC" rx="2"/>
      <rect x="10" y="12" width="40" height="8" fill="#CE93D8" rx="2"/>
      <rect x="55" y="12" width="30" height="8" fill="#AB47BC" rx="2"/>
      <rect x="5" y="24" width="35" height="8" fill="#AB47BC" rx="2"/>
      <rect x="45" y="24" width="25" height="8" fill="#CE93D8" rx="2"/>
    </g>
    
    <text x="70" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Peptide mixture</text>
  </g>
  
  <!-- LC Separation -->
  <g transform="translate(190, 70)">
    <rect x="0" y="0" width="140" height="160" fill="white" stroke="#1565C0" stroke-width="2" rx="10" filter="url(#shadowMS)"/>
    <rect x="0" y="0" width="140" height="28" fill="#1565C0" rx="10"/>
    <rect x="0" y="20" width="140" height="8" fill="#1565C0"/>
    <text x="70" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">2. LC Separation</text>
    
    <!-- Column -->
    <rect x="30" y="40" width="80" height="100" fill="#E3F2FD" stroke="#1565C0" stroke-width="2" rx="5"/>
    <text x="70" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1565C0" font-weight="bold">C18 Column</text>
    
    <!-- Peptides separating -->
    <circle cx="50" cy="80" r="5" fill="#E53935"/>
    <circle cx="70" cy="95" r="5" fill="#43A047"/>
    <circle cx="90" cy="110" r="5" fill="#FB8C00"/>
    <circle cx="50" cy="125" r="5" fill="#7B1FA2"/>
    
    <text x="70" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Hydrophobicity gradient</text>
  </g>
  
  <!-- Mass Spectrometer -->
  <g transform="translate(350, 70)">
    <rect x="0" y="0" width="200" height="160" fill="white" stroke="url(#msGrad)" stroke-width="2" rx="10" filter="url(#shadowMS)"/>
    <rect x="0" y="0" width="200" height="28" fill="url(#msGrad)" rx="10"/>
    <rect x="0" y="20" width="200" height="8" fill="url(#msGrad)"/>
    <text x="100" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">3. Mass Spectrometer</text>
    
    <!-- Ion source -->
    <g transform="translate(15, 40)">
      <rect x="0" y="0" width="50" height="35" fill="#E0F2F1" stroke="#00897B" rx="3"/>
      <text x="25" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#00695C" font-weight="bold">ESI</text>
      <text x="25" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">Ion Source</text>
    </g>
    
    <!-- Mass analyzer -->
    <g transform="translate(75, 40)">
      <rect x="0" y="0" width="50" height="35" fill="#E0F2F1" stroke="#00897B" rx="3"/>
      <text x="25" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#00695C" font-weight="bold">Orbitrap</text>
      <text x="25" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">Analyzer</text>
    </g>
    
    <!-- Detector -->
    <g transform="translate(135, 40)">
      <rect x="0" y="0" width="50" height="35" fill="#E0F2F1" stroke="#00897B" rx="3"/>
      <text x="25" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#00695C" font-weight="bold">Detector</text>
    </g>
    
    <!-- Arrows -->
    <path d="M70,57 L80,57" stroke="#00897B" stroke-width="2" fill="none" marker-end="url(#arrowMS)"/>
    <path d="M130,57 L140,57" stroke="#00897B" stroke-width="2" fill="none"/>
    
    <!-- MS spectrum mini -->
    <g transform="translate(15, 90)">
      <rect x="0" y="0" width="170" height="55" fill="#F5F5F5" rx="3"/>
      <line x1="10" y1="45" x2="160" y2="45" stroke="#666" stroke-width="1"/>
      <line x1="10" y1="10" x2="10" y2="45" stroke="#666" stroke-width="1"/>
      <rect x="25" y="30" width="3" height="15" fill="#00897B"/>
      <rect x="40" y="15" width="3" height="30" fill="#00897B"/>
      <rect x="55" y="35" width="3" height="10" fill="#26A69A"/>
      <rect x="70" y="20" width="3" height="25" fill="#00897B"/>
      <rect x="90" y="10" width="3" height="35" fill="#004D40"/>
      <rect x="110" y="25" width="3" height="20" fill="#00897B"/>
      <rect x="130" y="32" width="3" height="13" fill="#26A69A"/>
      <rect x="145" y="38" width="3" height="7" fill="#26A69A"/>
      <text x="85" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">m/z</text>
    </g>
  </g>
  
  <!-- Data Analysis -->
  <g transform="translate(570, 70)">
    <rect x="0" y="0" width="200" height="160" fill="white" stroke="#E53935" stroke-width="2" rx="10" filter="url(#shadowMS)"/>
    <rect x="0" y="0" width="200" height="28" fill="#E53935" rx="10"/>
    <rect x="0" y="20" width="200" height="8" fill="#E53935"/>
    <text x="100" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">4. Data Analysis</text>
    
    <text x="15" y="50" font-family="Arial, sans-serif" font-size="10" fill="#333" font-weight="bold">Database Search:</text>
    <text x="25" y="68" font-family="Arial, sans-serif" font-size="9" fill="#666">• Match spectra to peptides</text>
    <text x="25" y="83" font-family="Arial, sans-serif" font-size="9" fill="#666">• MaxQuant, Proteome Discoverer</text>
    
    <text x="15" y="105" font-family="Arial, sans-serif" font-size="10" fill="#333" font-weight="bold">Quantification:</text>
    <text x="25" y="123" font-family="Arial, sans-serif" font-size="9" fill="#666">• Label-free (LFQ)</text>
    <text x="25" y="138" font-family="Arial, sans-serif" font-size="9" fill="#666">• TMT/iTRAQ labeling</text>
    <text x="25" y="153" font-family="Arial, sans-serif" font-size="9" fill="#666">• SILAC</text>
  </g>
  
  <!-- Workflow Types -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="320" height="200" fill="white" stroke="#1565C0" stroke-width="2" rx="10" filter="url(#shadowMS)"/>
    <text x="160" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1565C0">MS Acquisition Modes</text>
    
    <!-- DDA -->
    <g transform="translate(15, 45)">
      <rect x="0" y="0" width="135" height="70" fill="#E3F2FD" rx="5"/>
      <text x="67" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1565C0">DDA</text>
      <text x="67" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#333">Data-Dependent</text>
      <text x="67" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666">Top-N most intense</text>
      <text x="67" y="63" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666">ions selected</text>
    </g>
    
    <!-- DIA -->
    <g transform="translate(165, 45)">
      <rect x="0" y="0" width="135" height="70" fill="#E8F5E9" rx="5"/>
      <text x="67" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#43A047">DIA</text>
      <text x="67" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#333">Data-Independent</text>
      <text x="67" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666">All ions in windows</text>
      <text x="67" y="63" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666">fragmented</text>
    </g>
    
    <!-- Applications -->
    <text x="15" y="135" font-family="Arial, sans-serif" font-size="11" fill="#333" font-weight="bold">Applications:</text>
    <text x="25" y="155" font-family="Arial, sans-serif" font-size="10" fill="#666">• Protein identification &amp; quantification</text>
    <text x="25" y="172" font-family="Arial, sans-serif" font-size="10" fill="#666">• Post-translational modifications (PTMs)</text>
    <text x="25" y="189" font-family="Arial, sans-serif" font-size="10" fill="#666">• Protein-protein interactions</text>
  </g>
  
  <!-- Output -->
  <g transform="translate(400, 250)">
    <rect x="0" y="0" width="370" height="200" fill="white" stroke="#7B1FA2" stroke-width="2" rx="10" filter="url(#shadowMS)"/>
    <text x="185" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#7B1FA2">Proteomics Output</text>
    
    <!-- Protein list -->
    <g transform="translate(15, 40)">
      <rect x="0" y="0" width="160" height="90" fill="#F5F5F5" rx="3"/>
      <text x="80" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">Protein List</text>
      <text x="10" y="32" font-family="monospace" font-size="8" fill="#666">Protein    #Pep  Score</text>
      <text x="10" y="46" font-family="monospace" font-size="8" fill="#333">HSP90AA1   45    312.5</text>
      <text x="10" y="60" font-family="monospace" font-size="8" fill="#333">ACTB       38    287.2</text>
      <text x="10" y="74" font-family="monospace" font-size="8" fill="#333">GAPDH      32    245.8</text>
      <text x="10" y="88" font-family="monospace" font-size="8" fill="#999">...</text>
    </g>
    
    <!-- Quantitative data -->
    <g transform="translate(195, 40)">
      <rect x="0" y="0" width="160" height="90" fill="#F3E5F5" rx="3"/>
      <text x="80" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">Quantification</text>
      
      <!-- Mini bar chart -->
      <rect x="20" y="30" width="25" height="50" fill="#7B1FA2"/>
      <rect x="55" y="45" width="25" height="35" fill="#AB47BC"/>
      <rect x="90" y="35" width="25" height="45" fill="#7B1FA2"/>
      <rect x="125" y="55" width="25" height="25" fill="#CE93D8"/>
      <text x="80" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">Samples</text>
    </g>
    
    <!-- Tools list -->
    <g transform="translate(15, 140)">
      <text x="0" y="15" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Software:</text>
      <text x="70" y="15" font-family="Arial, sans-serif" font-size="9" fill="#666">MaxQuant • Proteome Discoverer • MSFragger</text>
      <text x="0" y="35" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Databases:</text>
      <text x="70" y="35" font-family="Arial, sans-serif" font-size="9" fill="#666">UniProt • RefSeq • Ensembl</text>
    </g>
  </g>
  
  <!-- Footer -->
  <text x="400" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888">Mass spectrometry enables comprehensive protein identification, quantification, and characterization</text>
</svg>