<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400">
  <defs>
    <linearGradient id="dnaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#42A5F5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rnaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E7D32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#66BB6A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="proteinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E65100;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF9800;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5C6BC0"/>
    </marker>
  </defs>
  
  <rect width="100%" height="100%" fill="#FAFAFA" rx="12"/>
  <text x="450" y="45" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="700" fill="#263238">The Central Dogma of Molecular Biology</text>
  
  <!-- DNA Double Helix -->
  <g transform="translate(80, 100)" filter="url(#shadow)">
    <rect width="180" height="220" rx="16" fill="url(#dnaGrad)"/>
    <text x="90" y="35" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="22" font-weight="600" fill="white">DNA</text>
    <g transform="translate(90, 130)">
      <path d="M-40,-60 Q-20,-45 0,-30 Q20,-15 40,0 Q20,15 0,30 Q-20,45 -40,60" stroke="#E3F2FD" stroke-width="8" fill="none"/>
      <path d="M40,-60 Q20,-45 0,-30 Q-20,-15 -40,0 Q-20,15 0,30 Q20,45 40,60" stroke="#BBDEFB" stroke-width="8" fill="none"/>
      <line x1="-30" y1="-50" x2="30" y2="-50" stroke="#E8F5E9" stroke-width="4"/>
      <line x1="-35" y1="-30" x2="35" y2="-30" stroke="#FFECB3" stroke-width="4"/>
      <line x1="-35" y1="-10" x2="35" y2="-10" stroke="#E8F5E9" stroke-width="4"/>
      <line x1="-35" y1="10" x2="35" y2="10" stroke="#FFCDD2" stroke-width="4"/>
      <line x1="-35" y1="30" x2="35" y2="30" stroke="#E8F5E9" stroke-width="4"/>
      <line x1="-30" y1="50" x2="30" y2="50" stroke="#FFECB3" stroke-width="4"/>
    </g>
    <text x="90" y="205" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="13" fill="#E3F2FD">Deoxyribonucleic Acid</text>
  </g>
  
  <!-- Transcription Arrow -->
  <g transform="translate(280, 190)">
    <line x1="0" y1="0" x2="100" y2="0" stroke="#5C6BC0" stroke-width="4" marker-end="url(#arrowhead)"/>
    <text x="50" y="-15" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="14" font-weight="600" fill="#5C6BC0">Transcription</text>
    <text x="50" y="25" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="11" fill="#78909C">RNA Polymerase</text>
  </g>
  
  <!-- mRNA -->
  <g transform="translate(400, 100)" filter="url(#shadow)">
    <rect width="180" height="220" rx="16" fill="url(#rnaGrad)"/>
    <text x="90" y="35" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="22" font-weight="600" fill="white">mRNA</text>
    <g transform="translate(90, 130)">
      <path d="M-45,-55 Q-25,-35 -5,-15 Q15,5 35,25 Q15,45 -5,65" stroke="#C8E6C9" stroke-width="10" fill="none" stroke-linecap="round"/>
      <rect x="-55" y="-65" width="30" height="20" rx="4" fill="#A5D6A7"/>
      <text x="-40" y="-52" text-anchor="middle" font-family="monospace" font-size="10" fill="#1B5E20">AUG</text>
      <rect x="-35" y="-35" width="30" height="20" rx="4" fill="#81C784"/>
      <text x="-20" y="-22" text-anchor="middle" font-family="monospace" font-size="10" fill="#1B5E20">GCU</text>
      <rect x="-15" y="-5" width="30" height="20" rx="4" fill="#A5D6A7"/>
      <text x="0" y="8" text-anchor="middle" font-family="monospace" font-size="10" fill="#1B5E20">CAG</text>
      <rect x="5" y="25" width="30" height="20" rx="4" fill="#81C784"/>
      <text x="20" y="38" text-anchor="middle" font-family="monospace" font-size="10" fill="#1B5E20">UAA</text>
    </g>
    <text x="90" y="205" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="13" fill="#C8E6C9">Messenger RNA</text>
  </g>
  
  <!-- Translation Arrow -->
  <g transform="translate(600, 190)">
    <line x1="0" y1="0" x2="100" y2="0" stroke="#5C6BC0" stroke-width="4" marker-end="url(#arrowhead)"/>
    <text x="50" y="-15" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="14" font-weight="600" fill="#5C6BC0">Translation</text>
    <text x="50" y="25" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="11" fill="#78909C">Ribosome + tRNA</text>
  </g>
  
  <!-- Protein -->
  <g transform="translate(720, 100)" filter="url(#shadow)">
    <rect width="160" height="220" rx="16" fill="url(#proteinGrad)"/>
    <text x="80" y="35" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="22" font-weight="600" fill="white">Protein</text>
    <g transform="translate(80, 125)">
      <ellipse cx="0" cy="0" rx="45" ry="55" fill="#FFE0B2" stroke="#E65100" stroke-width="2"/>
      <path d="M-25,-35 Q0,-50 25,-35 Q35,-15 25,10 Q0,30 -25,10 Q-35,-15 -25,-35" fill="#FFCC80" stroke="#F57C00" stroke-width="2"/>
      <circle cx="-15" cy="-20" r="8" fill="#FF8A65"/>
      <circle cx="15" cy="-10" r="6" fill="#FFAB91"/>
      <circle cx="0" cy="15" r="10" fill="#FF7043"/>
      <circle cx="-20" cy="5" r="5" fill="#FFAB91"/>
    </g>
    <text x="80" y="205" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="13" fill="#FFE0B2">Polypeptide Chain</text>
  </g>
  
  <g transform="translate(80, 350)">
    <rect x="0" y="0" width="740" height="35" rx="8" fill="#ECEFF1"/>
    <circle cx="25" cy="17" r="8" fill="#1565C0"/>
    <text x="40" y="22" font-family="'Segoe UI', Arial" font-size="12" fill="#37474F">Storage</text>
    <circle cx="130" cy="17" r="8" fill="#2E7D32"/>
    <text x="145" y="22" font-family="'Segoe UI', Arial" font-size="12" fill="#37474F">Messenger</text>
    <circle cx="250" cy="17" r="8" fill="#E65100"/>
    <text x="265" y="22" font-family="'Segoe UI', Arial" font-size="12" fill="#37474F">Function</text>
    <text x="580" y="22" font-family="'Segoe UI', Arial" font-size="11" font-style="italic" fill="#607D8B">Francis Crick, 1958</text>
  </g>
</svg>
