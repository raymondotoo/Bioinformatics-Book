<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="gwasGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00897B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#26A69A;stop-opacity:1" />
    </linearGradient>
    <filter id="shadowGwas" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="#FAFAFA"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#00897B">Genome-Wide Association Study (GWAS)</text>
  
  <!-- Manhattan Plot -->
  <g transform="translate(30, 50)">
    <rect x="0" y="0" width="520" height="260" fill="white" stroke="url(#gwasGrad)" stroke-width="2" rx="10" filter="url(#shadowGwas)"/>
    <text x="260" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#00897B">Manhattan Plot</text>
    
    <!-- Plot area -->
    <rect x="45" y="35" width="460" height="190" fill="#F8F9FA" stroke="#E0E0E0"/>
    
    <!-- Y-axis -->
    <line x1="45" y1="35" x2="45" y2="225" stroke="#333" stroke-width="1"/>
    <text x="15" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333" transform="rotate(-90, 15, 130)">-log₁₀(p)</text>
    <text x="40" y="228" text-anchor="end" font-family="Arial, sans-serif" font-size="8" fill="#666">0</text>
    <text x="40" y="178" text-anchor="end" font-family="Arial, sans-serif" font-size="8" fill="#666">4</text>
    <text x="40" y="128" text-anchor="end" font-family="Arial, sans-serif" font-size="8" fill="#666">8</text>
    <text x="40" y="78" text-anchor="end" font-family="Arial, sans-serif" font-size="8" fill="#666">12</text>
    <text x="40" y="45" text-anchor="end" font-family="Arial, sans-serif" font-size="8" fill="#666">16</text>
    
    <!-- X-axis -->
    <line x1="45" y1="225" x2="505" y2="225" stroke="#333" stroke-width="1"/>
    <text x="275" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Chromosome</text>
    
    <!-- Significance thresholds -->
    <line x1="45" y1="65" x2="505" y2="65" stroke="#E53935" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="510" y="68" font-family="Arial, sans-serif" font-size="8" fill="#E53935">p = 5×10⁻⁸</text>
    
    <line x1="45" y1="115" x2="505" y2="115" stroke="#1976D2" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="510" y="118" font-family="Arial, sans-serif" font-size="8" fill="#1976D2">p = 5×10⁻⁶</text>
    
    <!-- Chromosome regions with points -->
    <!-- Chr 1 -->
    <g fill="#1565C0">
      <circle cx="55" cy="215" r="2.5"/>
      <circle cx="60" cy="200" r="2.5"/>
      <circle cx="65" cy="195" r="2.5"/>
      <circle cx="70" cy="210" r="2.5"/>
      <circle cx="75" cy="180" r="2.5"/>
      <circle cx="80" cy="205" r="2.5"/>
      <circle cx="85" cy="190" r="2.5"/>
    </g>
    <text x="70" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">1</text>
    
    <!-- Chr 2 -->
    <g fill="#00897B">
      <circle cx="100" cy="208" r="2.5"/>
      <circle cx="105" cy="195" r="2.5"/>
      <circle cx="110" cy="212" r="2.5"/>
      <circle cx="115" cy="185" r="2.5"/>
      <circle cx="120" cy="200" r="2.5"/>
    </g>
    <text x="110" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">2</text>
    
    <!-- Chr 3 -->
    <g fill="#1565C0">
      <circle cx="135" cy="200" r="2.5"/>
      <circle cx="140" cy="188" r="2.5"/>
      <circle cx="145" cy="205" r="2.5"/>
      <circle cx="150" cy="175" r="2.5"/>
      <circle cx="155" cy="195" r="2.5"/>
    </g>
    <text x="145" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">3</text>
    
    <!-- Chr 4 -->
    <g fill="#00897B">
      <circle cx="170" cy="210" r="2.5"/>
      <circle cx="175" cy="192" r="2.5"/>
      <circle cx="180" cy="205" r="2.5"/>
      <circle cx="185" cy="180" r="2.5"/>
    </g>
    <text x="177" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">4</text>
    
    <!-- Chr 5 - with peak -->
    <g fill="#1565C0">
      <circle cx="198" cy="195" r="2.5"/>
      <circle cx="203" cy="170" r="2.5"/>
      <circle cx="208" cy="140" r="3"/>
      <circle cx="213" cy="100" r="3.5"/>
      <circle cx="218" cy="55" r="5" fill="#E53935"/><!-- Significant hit -->
      <circle cx="223" cy="95" r="3.5"/>
      <circle cx="228" cy="145" r="3"/>
      <circle cx="233" cy="175" r="2.5"/>
      <circle cx="238" cy="195" r="2.5"/>
    </g>
    <text x="218" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">5</text>
    <!-- Gene annotation -->
    <line x1="218" y1="50" x2="218" y2="40" stroke="#E53935" stroke-width="1"/>
    <text x="218" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#E53935">rs12345</text>
    
    <!-- Chr 6 -->
    <g fill="#00897B">
      <circle cx="252" cy="200" r="2.5"/>
      <circle cx="258" cy="185" r="2.5"/>
      <circle cx="264" cy="195" r="2.5"/>
      <circle cx="270" cy="178" r="2.5"/>
      <circle cx="276" cy="205" r="2.5"/>
    </g>
    <text x="264" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">6</text>
    
    <!-- Chr 7-9 -->
    <g fill="#1565C0">
      <circle cx="288" cy="195" r="2.5"/>
      <circle cx="293" cy="208" r="2.5"/>
      <circle cx="298" cy="185" r="2.5"/>
    </g>
    <text x="293" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">7</text>
    
    <g fill="#00897B">
      <circle cx="310" cy="202" r="2.5"/>
      <circle cx="315" cy="190" r="2.5"/>
      <circle cx="320" cy="198" r="2.5"/>
    </g>
    <text x="315" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">8</text>
    
    <g fill="#1565C0">
      <circle cx="332" cy="188" r="2.5"/>
      <circle cx="337" cy="200" r="2.5"/>
      <circle cx="342" cy="195" r="2.5"/>
    </g>
    <text x="337" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">9</text>
    
    <!-- Chr 10-12 with another peak -->
    <g fill="#00897B">
      <circle cx="355" cy="198" r="2.5"/>
      <circle cx="360" cy="185" r="2.5"/>
      <circle cx="365" cy="205" r="2.5"/>
    </g>
    <text x="360" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">10</text>
    
    <g fill="#1565C0">
      <circle cx="378" cy="190" r="2.5"/>
      <circle cx="383" cy="155" r="3"/>
      <circle cx="388" cy="110" r="3.5"/>
      <circle cx="393" cy="60" r="4.5" fill="#E53935"/><!-- Significant -->
      <circle cx="398" cy="125" r="3"/>
      <circle cx="403" cy="170" r="2.5"/>
    </g>
    <text x="390" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">11</text>
    <line x1="393" y1="55" x2="393" y2="45" stroke="#E53935" stroke-width="1"/>
    <text x="393" y="43" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#E53935">rs67890</text>
    
    <!-- Chr 12-15 -->
    <g fill="#00897B">
      <circle cx="418" cy="205" r="2.5"/>
      <circle cx="423" cy="192" r="2.5"/>
    </g>
    <text x="420" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">12</text>
    
    <g fill="#1565C0">
      <circle cx="438" cy="198" r="2.5"/>
      <circle cx="443" cy="185" r="2.5"/>
      <circle cx="448" cy="202" r="2.5"/>
    </g>
    <text x="443" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">13</text>
    
    <g fill="#00897B">
      <circle cx="460" cy="195" r="2.5"/>
      <circle cx="465" cy="208" r="2.5"/>
    </g>
    <text x="462" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">14</text>
    
    <g fill="#1565C0">
      <circle cx="478" cy="200" r="2.5"/>
      <circle cx="485" cy="188" r="2.5"/>
      <circle cx="492" cy="205" r="2.5"/>
      <circle cx="499" cy="195" r="2.5"/>
    </g>
    <text x="488" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">15+</text>
  </g>
  
  <!-- GWAS Workflow -->
  <g transform="translate(570, 50)">
    <rect x="0" y="0" width="200" height="260" fill="white" stroke="#FF7043" stroke-width="2" rx="10" filter="url(#shadowGwas)"/>
    <rect x="0" y="0" width="200" height="25" fill="#FF7043" rx="10"/>
    <rect x="0" y="18" width="200" height="8" fill="#FF7043"/>
    <text x="100" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">GWAS Workflow</text>
    
    <g transform="translate(15, 38)">
      <!-- Steps -->
      <rect x="0" y="0" width="170" height="28" fill="#E3F2FD" stroke="#1976D2" rx="4"/>
      <text x="85" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1976D2">1. Genotyping</text>
      <text x="85" y="23" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">SNP array / WGS</text>
      
      <polygon points="85,32 80,38 90,38" fill="#1976D2"/>
      
      <rect x="0" y="42" width="170" height="28" fill="#E8F5E9" stroke="#388E3C" rx="4"/>
      <text x="85" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#388E3C">2. QC & Imputation</text>
      <text x="85" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">Filter, phase, impute</text>
      
      <polygon points="85,74 80,80 90,80" fill="#388E3C"/>
      
      <rect x="0" y="84" width="170" height="28" fill="#FFF3E0" stroke="#F57C00" rx="4"/>
      <text x="85" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#F57C00">3. Association Test</text>
      <text x="85" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">Linear/logistic regression</text>
      
      <polygon points="85,116 80,122 90,122" fill="#F57C00"/>
      
      <rect x="0" y="126" width="170" height="28" fill="#FCE4EC" stroke="#C2185B" rx="4"/>
      <text x="85" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#C2185B">4. Multiple Testing</text>
      <text x="85" y="149" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">Bonferroni / FDR</text>
      
      <polygon points="85,158 80,164 90,164" fill="#C2185B"/>
      
      <rect x="0" y="168" width="170" height="28" fill="#E8EAF6" stroke="#5C6BC0" rx="4"/>
      <text x="85" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#5C6BC0">5. Annotation</text>
      <text x="85" y="191" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">Gene mapping, pathways</text>
    </g>
  </g>
  
  <!-- Study Design -->
  <g transform="translate(30, 325)">
    <rect x="0" y="0" width="360" height="110" fill="white" stroke="#1976D2" stroke-width="2" rx="10" filter="url(#shadowGwas)"/>
    <text x="180" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1976D2">Study Design</text>
    
    <g transform="translate(20, 35)">
      <!-- Cases -->
      <rect x="0" y="0" width="100" height="60" fill="#FFEBEE" stroke="#E53935" rx="5"/>
      <text x="50" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#E53935">Cases</text>
      <text x="50" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666">Affected</text>
      <text x="50" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666">individuals</text>
      <text x="50" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#E53935">n = 5,000</text>
      
      <text x="130" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#666">vs</text>
      
      <!-- Controls -->
      <rect x="160" y="0" width="100" height="60" fill="#E3F2FD" stroke="#1976D2" rx="5"/>
      <text x="210" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1976D2">Controls</text>
      <text x="210" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666">Unaffected</text>
      <text x="210" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666">individuals</text>
      <text x="210" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1976D2">n = 10,000</text>
      
      <text x="280" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#666">→</text>
      <text x="305" y="32" font-family="Arial, sans-serif" font-size="8" fill="#666">Identify</text>
      <text x="305" y="44" font-family="Arial, sans-serif" font-size="8" fill="#666">risk</text>
      <text x="305" y="56" font-family="Arial, sans-serif" font-size="8" fill="#666">variants</text>
    </g>
  </g>
  
  <!-- Key Statistics -->
  <g transform="translate(410, 325)">
    <rect x="0" y="0" width="360" height="110" fill="white" stroke="#7B1FA2" stroke-width="2" rx="10" filter="url(#shadowGwas)"/>
    <text x="180" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#7B1FA2">Key Metrics</text>
    
    <g transform="translate(15, 35)">
      <text x="0" y="12" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">Odds Ratio (OR):</text>
      <text x="95" y="12" font-family="Arial, sans-serif" font-size="9" fill="#666">Effect size per allele</text>
      
      <text x="0" y="32" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">MAF:</text>
      <text x="35" y="32" font-family="Arial, sans-serif" font-size="9" fill="#666">Minor allele frequency (≥1%)</text>
      
      <text x="0" y="52" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">Heritability:</text>
      <text x="65" y="52" font-family="Arial, sans-serif" font-size="9" fill="#666">h² = genetic variance ratio</text>
      
      <text x="175" y="12" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">LD:</text>
      <text x="195" y="12" font-family="Arial, sans-serif" font-size="9" fill="#666">Linkage disequilibrium</text>
      
      <text x="175" y="32" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">PRS:</text>
      <text x="200" y="32" font-family="Arial, sans-serif" font-size="9" fill="#666">Polygenic risk score</text>
      
      <text x="175" y="52" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">λ<tspan baseline-shift="sub" font-size="7">GC</tspan>:</text>
      <text x="198" y="52" font-family="Arial, sans-serif" font-size="9" fill="#666">Genomic inflation</text>
    </g>
  </g>
  
  <!-- Tools footer -->
  <g transform="translate(30, 440)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">Tools:</text>
    <text x="42" y="0" font-family="Arial, sans-serif" font-size="9" fill="#666">PLINK • GCTA • BOLT-LMM • SAIGE • LocusZoom | Resources: GWAS Catalog, UK Biobank, dbGaP</text>
  </g>
</svg>