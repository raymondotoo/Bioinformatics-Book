<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="900" height="480">
  <defs>
    <linearGradient id="bioGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0"/>
      <stop offset="100%" style="stop-color:#42A5F5"/>
    </linearGradient>
    <linearGradient id="compGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00897B"/>
      <stop offset="100%" style="stop-color:#4DB6AC"/>
    </linearGradient>
    <linearGradient id="insightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B1FA2"/>
      <stop offset="100%" style="stop-color:#AB47BC"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="3" dy="4" stdDeviation="5" flood-opacity="0.15"/>
    </filter>
    <marker id="flowArrow" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#5C6BC0"/>
    </marker>
  </defs>
  
  <rect width="100%" height="100%" fill="#FAFAFA" rx="12"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="30" font-weight="700" fill="#1A237E">Bioinformatics</text>
  <text x="450" y="75" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="15" fill="#5C6BC0">The Intersection of Biology, Computer Science &amp; Statistics</text>
  
  <!-- Central Venn Diagram Area -->
  <g transform="translate(450, 260)">
    <!-- Biology Circle -->
    <g transform="translate(-120, -60)" filter="url(#shadow)">
      <circle cx="0" cy="0" r="110" fill="url(#bioGrad)" opacity="0.8"/>
      <text x="0" y="-70" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="18" font-weight="600" fill="white">Biology</text>
      <text x="-45" y="-35" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="10" fill="#E3F2FD">• Genomics</text>
      <text x="-45" y="-18" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="10" fill="#E3F2FD">• Proteomics</text>
      <text x="-45" y="-1" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="10" fill="#E3F2FD">• Transcriptomics</text>
      <text x="-45" y="16" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="10" fill="#E3F2FD">• Metabolomics</text>
    </g>
    
    <!-- Computer Science Circle -->
    <g transform="translate(120, -60)" filter="url(#shadow)">
      <circle cx="0" cy="0" r="110" fill="url(#compGrad)" opacity="0.8"/>
      <text x="0" y="-70" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="18" font-weight="600" fill="white">Computation</text>
      <text x="45" y="-35" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="10" fill="#E0F2F1">• Algorithms</text>
      <text x="45" y="-18" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="10" fill="#E0F2F1">• Databases</text>
      <text x="45" y="-1" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="10" fill="#E0F2F1">• Machine Learning</text>
      <text x="45" y="16" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="10" fill="#E0F2F1">• Cloud Computing</text>
    </g>
    
    <!-- Statistics Circle -->
    <g transform="translate(0, 80)" filter="url(#shadow)">
      <circle cx="0" cy="0" r="110" fill="url(#insightGrad)" opacity="0.8"/>
      <text x="0" y="60" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="18" font-weight="600" fill="white">Statistics</text>
      <text x="0" y="-25" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="10" fill="#F3E5F5">• Hypothesis Testing</text>
      <text x="0" y="-8" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="10" fill="#F3E5F5">• Regression Models</text>
      <text x="0" y="9" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="10" fill="#F3E5F5">• Bayesian Methods</text>
      <text x="0" y="26" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="10" fill="#F3E5F5">• Multivariate Analysis</text>
    </g>
    
    <!-- Center intersection - Bioinformatics -->
    <circle cx="0" cy="0" r="40" fill="white" stroke="#FF6F00" stroke-width="3"/>
    <text x="0" y="-8" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="11" font-weight="700" fill="#E65100">Bioinfor-</text>
    <text x="0" y="8" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="11" font-weight="700" fill="#E65100">matics</text>
  </g>
  
  <!-- Applications Panel - Left -->
  <g transform="translate(30, 120)" filter="url(#shadow)">
    <rect width="160" height="200" rx="10" fill="white" stroke="#E0E0E0"/>
    <rect width="160" height="35" rx="10" fill="#1565C0"/>
    <text x="80" y="24" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="13" font-weight="600" fill="white">Applications</text>
    
    <g transform="translate(15, 50)">
      <circle cx="8" cy="8" r="5" fill="#E91E63"/>
      <text x="22" y="12" font-family="'Segoe UI', Arial" font-size="10" fill="#37474F">Drug Discovery</text>
      
      <circle cx="8" cy="33" r="5" fill="#9C27B0"/>
      <text x="22" y="37" font-family="'Segoe UI', Arial" font-size="10" fill="#37474F">Precision Medicine</text>
      
      <circle cx="8" cy="58" r="5" fill="#3F51B5"/>
      <text x="22" y="62" font-family="'Segoe UI', Arial" font-size="10" fill="#37474F">Vaccine Development</text>
      
      <circle cx="8" cy="83" r="5" fill="#00897B"/>
      <text x="22" y="87" font-family="'Segoe UI', Arial" font-size="10" fill="#37474F">Disease Diagnosis</text>
      
      <circle cx="8" cy="108" r="5" fill="#FF5722"/>
      <text x="22" y="112" font-family="'Segoe UI', Arial" font-size="10" fill="#37474F">Agriculture</text>
      
      <circle cx="8" cy="133" r="5" fill="#795548"/>
      <text x="22" y="137" font-family="'Segoe UI', Arial" font-size="10" fill="#37474F">Evolutionary Biology</text>
    </g>
  </g>
  
  <!-- Tools Panel - Right -->
  <g transform="translate(710, 120)" filter="url(#shadow)">
    <rect width="160" height="200" rx="10" fill="white" stroke="#E0E0E0"/>
    <rect width="160" height="35" rx="10" fill="#00897B"/>
    <text x="80" y="24" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="13" font-weight="600" fill="white">Key Tools</text>
    
    <g transform="translate(15, 50)">
      <rect width="130" height="22" rx="4" fill="#E8F5E9"/>
      <text x="65" y="15" text-anchor="middle" font-family="'Courier New'" font-size="10" fill="#2E7D32">BLAST, BWA, STAR</text>
      
      <rect y="28" width="130" height="22" rx="4" fill="#E3F2FD"/>
      <text x="65" y="43" text-anchor="middle" font-family="'Courier New'" font-size="10" fill="#1565C0">Python, R, Perl</text>
      
      <rect y="56" width="130" height="22" rx="4" fill="#F3E5F5"/>
      <text x="65" y="71" text-anchor="middle" font-family="'Courier New'" font-size="10" fill="#7B1FA2">DESeq2, edgeR</text>
      
      <rect y="84" width="130" height="22" rx="4" fill="#FFF3E0"/>
      <text x="65" y="99" text-anchor="middle" font-family="'Courier New'" font-size="10" fill="#E65100">AlphaFold, Rosetta</text>
      
      <rect y="112" width="130" height="22" rx="4" fill="#ECEFF1"/>
      <text x="65" y="127" text-anchor="middle" font-family="'Courier New'" font-size="10" fill="#37474F">Nextflow, Snakemake</text>
    </g>
  </g>
  
  <!-- Data Types - Bottom -->
  <g transform="translate(200, 400)">
    <rect width="500" height="65" rx="10" fill="#ECEFF1" filter="url(#shadow)"/>
    <text x="250" y="22" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="13" font-weight="600" fill="#37474F">Data We Analyze</text>
    
    <g transform="translate(30, 38)">
      <rect width="70" height="22" rx="4" fill="#1565C0"/>
      <text x="35" y="15" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="9" fill="white">Sequences</text>
      
      <rect x="80" width="70" height="22" rx="4" fill="#7B1FA2"/>
      <text x="115" y="15" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="9" fill="white">Structures</text>
      
      <rect x="160" width="80" height="22" rx="4" fill="#00897B"/>
      <text x="200" y="15" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="9" fill="white">Expression</text>
      
      <rect x="250" width="70" height="22" rx="4" fill="#FF5722"/>
      <text x="285" y="15" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="9" fill="white">Networks</text>
      
      <rect x="330" width="70" height="22" rx="4" fill="#E91E63"/>
      <text x="365" y="15" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="9" fill="white">Variants</text>
    </g>
  </g>
</svg>
