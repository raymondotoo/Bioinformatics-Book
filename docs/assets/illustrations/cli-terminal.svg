<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="termGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="guiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow5" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#FAFAFA"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1565C0">Command Line Interface vs Graphical User Interface</text>
  
  <!-- CLI Section -->
  <g transform="translate(50, 65)">
    <text x="165" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#00897B">Command Line Interface (CLI)</text>
    
    <!-- Terminal window -->
    <rect x="0" y="40" width="330" height="220" fill="url(#termGrad)" rx="8" filter="url(#shadow5)"/>
    
    <!-- Terminal title bar -->
    <rect x="0" y="40" width="330" height="25" fill="#2d2d44" rx="8"/>
    <rect x="0" y="55" width="330" height="10" fill="#2d2d44"/>
    <circle cx="18" cy="52" r="6" fill="#ff5f56"/>
    <circle cx="38" cy="52" r="6" fill="#ffbd2e"/>
    <circle cx="58" cy="52" r="6" fill="#27ca40"/>
    <text x="165" y="57" text-anchor="middle" font-family="monospace" font-size="11" fill="#888">Terminal — bash</text>
    
    <!-- Terminal content -->
    <text x="15" y="85" font-family="monospace" font-size="11" fill="#00ff00">user@biolab:~$</text>
    <text x="120" y="85" font-family="monospace" font-size="11" fill="#fff">blastn -query seq.fa -db nt</text>
    
    <text x="15" y="105" font-family="monospace" font-size="10" fill="#888">Running BLAST search...</text>
    <text x="15" y="120" font-family="monospace" font-size="10" fill="#888">Found 47 significant hits</text>
    
    <text x="15" y="145" font-family="monospace" font-size="11" fill="#00ff00">user@biolab:~$</text>
    <text x="120" y="145" font-family="monospace" font-size="11" fill="#fff">samtools view -bS reads.sam</text>
    
    <text x="15" y="170" font-family="monospace" font-size="11" fill="#00ff00">user@biolab:~$</text>
    <text x="120" y="170" font-family="monospace" font-size="11" fill="#fff">grep -c "^>" sequences.fasta</text>
    <text x="15" y="185" font-family="monospace" font-size="10" fill="#ffa500">1247</text>
    
    <text x="15" y="210" font-family="monospace" font-size="11" fill="#00ff00">user@biolab:~$</text>
    <text x="120" y="210" font-family="monospace" font-size="11" fill="#fff">python analyze.py | head -5</text>
    
    <text x="15" y="235" font-family="monospace" font-size="11" fill="#00ff00">user@biolab:~$</text>
    <rect x="120" y="225" width="8" height="15" fill="#00ff00" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0;0.8" dur="1s" repeatCount="indefinite"/>
    </rect>
    
    <!-- CLI Advantages -->
    <g transform="translate(0, 280)">
      <rect x="0" y="0" width="330" height="125" fill="white" stroke="#00897B" stroke-width="2" rx="8"/>
      <text x="165" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#00897B">✓ CLI Advantages</text>
      
      <text x="15" y="42" font-family="Arial, sans-serif" font-size="10" fill="#333">• Scriptable &amp; automatable (batch processing)</text>
      <text x="15" y="58" font-family="Arial, sans-serif" font-size="10" fill="#333">• Lightweight, uses minimal resources</text>
      <text x="15" y="74" font-family="Arial, sans-serif" font-size="10" fill="#333">• Remote access via SSH</text>
      <text x="15" y="90" font-family="Arial, sans-serif" font-size="10" fill="#333">• Precise control over parameters</text>
      <text x="15" y="106" font-family="Arial, sans-serif" font-size="10" fill="#333">• Pipelines: cmd1 | cmd2 | cmd3</text>
    </g>
  </g>
  
  <!-- VS divider -->
  <g transform="translate(400, 200)">
    <circle cx="0" cy="0" r="25" fill="#1565C0" filter="url(#shadow5)"/>
    <text x="0" y="6" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">VS</text>
  </g>
  
  <!-- GUI Section -->
  <g transform="translate(420, 65)">
    <text x="165" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#7B1FA2">Graphical User Interface (GUI)</text>
    
    <!-- GUI window -->
    <rect x="0" y="40" width="330" height="220" fill="url(#guiGrad)" rx="8" filter="url(#shadow5)"/>
    
    <!-- Window title bar -->
    <rect x="0" y="40" width="330" height="30" fill="#e0e0e0" rx="8"/>
    <rect x="0" y="60" width="330" height="10" fill="#e0e0e0"/>
    <circle cx="18" cy="55" r="6" fill="#ff5f56"/>
    <circle cx="38" cy="55" r="6" fill="#ffbd2e"/>
    <circle cx="58" cy="55" r="6" fill="#27ca40"/>
    <text x="165" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">BioAnalyzer Pro</text>
    
    <!-- Menu bar -->
    <rect x="5" y="75" width="320" height="20" fill="#f0f0f0" rx="2"/>
    <text x="20" y="89" font-family="Arial, sans-serif" font-size="10" fill="#333">File</text>
    <text x="50" y="89" font-family="Arial, sans-serif" font-size="10" fill="#333">Edit</text>
    <text x="80" y="89" font-family="Arial, sans-serif" font-size="10" fill="#333">Analysis</text>
    <text x="130" y="89" font-family="Arial, sans-serif" font-size="10" fill="#333">Tools</text>
    <text x="170" y="89" font-family="Arial, sans-serif" font-size="10" fill="#333">Help</text>
    
    <!-- Toolbar icons -->
    <g transform="translate(10, 100)">
      <rect x="0" y="0" width="24" height="24" fill="#42A5F5" rx="3"/>
      <text x="12" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">📂</text>
      
      <rect x="28" y="0" width="24" height="24" fill="#66BB6A" rx="3"/>
      <text x="40" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">💾</text>
      
      <rect x="56" y="0" width="24" height="24" fill="#FFA726" rx="3"/>
      <text x="68" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">▶</text>
      
      <rect x="84" y="0" width="24" height="24" fill="#EF5350" rx="3"/>
      <text x="96" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">⬜</text>
      
      <rect x="150" y="0" width="80" height="24" fill="white" stroke="#ccc" rx="3"/>
      <text x="160" y="16" font-family="Arial, sans-serif" font-size="9" fill="#888">🔍 Search...</text>
    </g>
    
    <!-- Main content area -->
    <rect x="10" y="130" width="200" height="120" fill="white" stroke="#ddd" rx="3"/>
    
    <!-- Data visualization -->
    <rect x="20" y="145" width="30" height="60" fill="#42A5F5"/>
    <rect x="55" y="155" width="30" height="50" fill="#66BB6A"/>
    <rect x="90" y="140" width="30" height="65" fill="#FFA726"/>
    <rect x="125" y="160" width="30" height="45" fill="#AB47BC"/>
    <rect x="160" y="150" width="30" height="55" fill="#EF5350"/>
    
    <text x="105" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Expression Levels</text>
    
    <!-- Side panel -->
    <rect x="220" y="130" width="100" height="120" fill="#f9f9f9" stroke="#ddd" rx="3"/>
    <text x="270" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">Properties</text>
    <text x="230" y="165" font-family="Arial, sans-serif" font-size="8" fill="#666">Samples: 5</text>
    <text x="230" y="180" font-family="Arial, sans-serif" font-size="8" fill="#666">Features: 1247</text>
    <text x="230" y="195" font-family="Arial, sans-serif" font-size="8" fill="#666">P-value: 0.001</text>
    
    <rect x="230" y="210" width="80" height="25" fill="#7B1FA2" rx="4"/>
    <text x="270" y="227" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Export ▼</text>
    
    <!-- GUI Advantages -->
    <g transform="translate(0, 280)">
      <rect x="0" y="0" width="330" height="125" fill="white" stroke="#7B1FA2" stroke-width="2" rx="8"/>
      <text x="165" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#7B1FA2">✓ GUI Advantages</text>
      
      <text x="15" y="42" font-family="Arial, sans-serif" font-size="10" fill="#333">• Intuitive, visual interaction</text>
      <text x="15" y="58" font-family="Arial, sans-serif" font-size="10" fill="#333">• Lower learning curve for beginners</text>
      <text x="15" y="74" font-family="Arial, sans-serif" font-size="10" fill="#333">• Real-time data visualization</text>
      <text x="15" y="90" font-family="Arial, sans-serif" font-size="10" fill="#333">• Point-and-click simplicity</text>
      <text x="15" y="106" font-family="Arial, sans-serif" font-size="10" fill="#333">• Built-in help &amp; tooltips</text>
    </g>
  </g>
  
  <!-- Bottom note -->
  <text x="400" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888">Most bioinformaticians use both: CLI for pipelines &amp; automation, GUI for exploration &amp; visualization</text>
</svg>