<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 500" width="950" height="500">
  <defs>
    <linearGradient id="mlGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6A1B9A"/>
      <stop offset="100%" style="stop-color:#AB47BC"/>
    </linearGradient>
    <linearGradient id="mlGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0"/>
      <stop offset="100%" style="stop-color:#42A5F5"/>
    </linearGradient>
    <linearGradient id="mlGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00897B"/>
      <stop offset="100%" style="stop-color:#4DB6AC"/>
    </linearGradient>
    <linearGradient id="mlGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E65100"/>
      <stop offset="100%" style="stop-color:#FF9800"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
    <marker id="mlArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5C6BC0"/>
    </marker>
  </defs>
  
  <rect width="100%" height="100%" fill="#FAFAFA" rx="12"/>
  
  <!-- Title -->
  <text x="475" y="40" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="26" font-weight="700" fill="#4A148C">Machine Learning in Bioinformatics</text>
  <text x="475" y="68" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="13" fill="#7B1FA2">From Biological Data to Predictive Models</text>
  
  <!-- ML Pipeline Flow -->
  <g transform="translate(50, 100)">
    <!-- Data Box -->
    <g filter="url(#shadow)">
      <rect width="150" height="120" rx="12" fill="url(#mlGrad1)"/>
      <text x="75" y="30" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="14" font-weight="600" fill="white">Biological Data</text>
      <line x1="15" y1="40" x2="135" y2="40" stroke="#E1BEE7" stroke-width="1"/>
      <text x="75" y="58" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="10" fill="#F3E5F5">• Gene expression</text>
      <text x="75" y="73" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="10" fill="#F3E5F5">• Protein sequences</text>
      <text x="75" y="88" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="10" fill="#F3E5F5">• Clinical features</text>
      <text x="75" y="103" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="10" fill="#F3E5F5">• Images, structures</text>
    </g>
    
    <line x1="160" y1="60" x2="200" y2="60" stroke="#5C6BC0" stroke-width="2" marker-end="url(#mlArrow)"/>
    
    <!-- Preprocessing -->
    <g transform="translate(210, 0)" filter="url(#shadow)">
      <rect width="150" height="120" rx="12" fill="url(#mlGrad2)"/>
      <text x="75" y="30" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="14" font-weight="600" fill="white">Preprocessing</text>
      <line x1="15" y1="40" x2="135" y2="40" stroke="#BBDEFB" stroke-width="1"/>
      <text x="75" y="58" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="10" fill="#E3F2FD">• Normalization</text>
      <text x="75" y="73" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="10" fill="#E3F2FD">• Feature selection</text>
      <text x="75" y="88" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="10" fill="#E3F2FD">• Imputation</text>
      <text x="75" y="103" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="10" fill="#E3F2FD">• Train/test split</text>
    </g>
    
    <line x1="370" y1="60" x2="410" y2="60" stroke="#5C6BC0" stroke-width="2" marker-end="url(#mlArrow)"/>
    
    <!-- Model Training -->
    <g transform="translate(420, 0)" filter="url(#shadow)">
      <rect width="150" height="120" rx="12" fill="url(#mlGrad3)"/>
      <text x="75" y="30" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="14" font-weight="600" fill="white">Model Training</text>
      <line x1="15" y1="40" x2="135" y2="40" stroke="#B2DFDB" stroke-width="1"/>
      <text x="75" y="58" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="10" fill="#E0F2F1">• Cross-validation</text>
      <text x="75" y="73" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="10" fill="#E0F2F1">• Hyperparameter tuning</text>
      <text x="75" y="88" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="10" fill="#E0F2F1">• Model selection</text>
      <text x="75" y="103" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="10" fill="#E0F2F1">• Ensemble methods</text>
    </g>
    
    <line x1="580" y1="60" x2="620" y2="60" stroke="#5C6BC0" stroke-width="2" marker-end="url(#mlArrow)"/>
    
    <!-- Evaluation -->
    <g transform="translate(630, 0)" filter="url(#shadow)">
      <rect width="150" height="120" rx="12" fill="url(#mlGrad4)"/>
      <text x="75" y="30" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="14" font-weight="600" fill="white">Evaluation</text>
      <line x1="15" y1="40" x2="135" y2="40" stroke="#FFCC80" stroke-width="1"/>
      <text x="75" y="58" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="10" fill="#FFF3E0">• AUC-ROC</text>
      <text x="75" y="73" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="10" fill="#FFF3E0">• Precision/Recall</text>
      <text x="75" y="88" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="10" fill="#FFF3E0">• Confusion matrix</text>
      <text x="75" y="103" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="10" fill="#FFF3E0">• SHAP values</text>
    </g>
  </g>
  
  <!-- ML Methods Panel -->
  <g transform="translate(50, 250)" filter="url(#shadow)">
    <rect width="420" height="200" rx="12" fill="white" stroke="#E0E0E0"/>
    <rect width="420" height="40" rx="12" fill="#6A1B9A"/>
    <text x="210" y="27" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="15" font-weight="600" fill="white">Machine Learning Methods</text>
    
    <g transform="translate(20, 55)">
      <!-- Supervised -->
      <g>
        <rect width="180" height="65" rx="8" fill="#E8EAF6"/>
        <text x="90" y="18" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="12" font-weight="600" fill="#3949AB">Supervised Learning</text>
        <text x="90" y="35" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="9" fill="#5C6BC0">• Random Forest</text>
        <text x="90" y="48" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="9" fill="#5C6BC0">• SVM, XGBoost</text>
        <text x="90" y="61" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="9" fill="#5C6BC0">• Neural Networks</text>
      </g>
      
      <!-- Unsupervised -->
      <g transform="translate(200, 0)">
        <rect width="180" height="65" rx="8" fill="#E0F2F1"/>
        <text x="90" y="18" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="12" font-weight="600" fill="#00695C">Unsupervised Learning</text>
        <text x="90" y="35" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="9" fill="#00897B">• PCA, UMAP, t-SNE</text>
        <text x="90" y="48" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="9" fill="#00897B">• K-means, HDBSCAN</text>
        <text x="90" y="61" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="9" fill="#00897B">• Autoencoders</text>
      </g>
      
      <!-- Deep Learning -->
      <g transform="translate(0, 80)">
        <rect width="180" height="65" rx="8" fill="#FCE4EC"/>
        <text x="90" y="18" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="12" font-weight="600" fill="#AD1457">Deep Learning</text>
        <text x="90" y="35" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="9" fill="#C2185B">• CNNs (images)</text>
        <text x="90" y="48" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="9" fill="#C2185B">• RNNs, Transformers</text>
        <text x="90" y="61" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="9" fill="#C2185B">• Graph Neural Networks</text>
      </g>
      
      <!-- Transfer Learning -->
      <g transform="translate(200, 80)">
        <rect width="180" height="65" rx="8" fill="#FFF8E1"/>
        <text x="90" y="18" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="12" font-weight="600" fill="#F57F17">Foundation Models</text>
        <text x="90" y="35" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="9" fill="#F9A825">• ESM (proteins)</text>
        <text x="90" y="48" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="9" fill="#F9A825">• DNABERT, Enformer</text>
        <text x="90" y="61" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="9" fill="#F9A825">• AlphaFold</text>
      </g>
    </g>
  </g>
  
  <!-- Applications Panel -->
  <g transform="translate(500, 250)" filter="url(#shadow)">
    <rect width="400" height="200" rx="12" fill="white" stroke="#E0E0E0"/>
    <rect width="400" height="40" rx="12" fill="#00695C"/>
    <text x="200" y="27" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="15" font-weight="600" fill="white">Biological Applications</text>
    
    <g transform="translate(25, 55)">
      <g>
        <circle cx="10" cy="8" r="7" fill="#E91E63"/>
        <text x="25" y="12" font-family="'Segoe UI', Arial" font-size="11" fill="#37474F">Disease classification &amp; diagnosis</text>
      </g>
      <g transform="translate(0, 28)">
        <circle cx="10" cy="8" r="7" fill="#9C27B0"/>
        <text x="25" y="12" font-family="'Segoe UI', Arial" font-size="11" fill="#37474F">Drug response prediction</text>
      </g>
      <g transform="translate(0, 56)">
        <circle cx="10" cy="8" r="7" fill="#3F51B5"/>
        <text x="25" y="12" font-family="'Segoe UI', Arial" font-size="11" fill="#37474F">Variant pathogenicity scoring</text>
      </g>
      <g transform="translate(0, 84)">
        <circle cx="10" cy="8" r="7" fill="#00897B"/>
        <text x="25" y="12" font-family="'Segoe UI', Arial" font-size="11" fill="#37474F">Protein structure &amp; function prediction</text>
      </g>
      <g transform="translate(0, 112)">
        <circle cx="10" cy="8" r="7" fill="#FF5722"/>
        <text x="25" y="12" font-family="'Segoe UI', Arial" font-size="11" fill="#37474F">Cell type annotation (single-cell)</text>
      </g>
      <g transform="translate(0, 140)">
        <circle cx="10" cy="8" r="7" fill="#795548"/>
        <text x="25" y="12" font-family="'Segoe UI', Arial" font-size="11" fill="#37474F">Biomarker discovery</text>
      </g>
    </g>
  </g>
  
  <!-- Footer Tools -->
  <g transform="translate(50, 460)">
    <rect width="850" height="30" rx="6" fill="#ECEFF1"/>
    <text x="80" y="20" font-family="'Segoe UI', Arial" font-size="11" font-weight="600" fill="#37474F">Tools:</text>
    <text x="330" y="20" font-family="'Courier New'" font-size="10" fill="#546E7A">scikit-learn • PyTorch • TensorFlow • XGBoost • Keras • Hugging Face • scanpy</text>
  </g>
</svg>
