site_name: The Serial Bioinformatician
site_description: A comprehensive guide from the central dogma to cutting-edge computational techniques in bioinformatics.
site_author: Raymond Otoo, Ph.D.
copyright: "© 2026 Raymond Otoo. Licensed under CC BY-SA 4.0."

# Use the 'docs' subdirectory for all documentation files.
docs_dir: docs

# Theme configuration for a professional look and feel
theme:
  name: material
  palette:
    # Palette toggle for light/dark mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  logo: 'assets/cover.png'
  favicon: 'assets/cover.png'
  icon:
    repo: fontawesome/brands/github

repo_url: https://github.com/your-username/Bioinformatics-Book
repo_name: Bioinformatics-Book

plugins:
  - search
  - with-pdf:
      cover: true
      custom_template_path: templates
      back_cover: false
      cover_title: 'The Serial Bioinformatician'
      cover_subtitle: 'A comprehensive guide from the central dogma to cutting-edge computational techniques in bioinformatics.'
      author: 'Raymond Otoo, Ph.D.'
      number_headings: false

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true
      toc_depth: 3

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

# Navigation: This creates the sidebar for your book
nav:
  - Home: README.md
  - 'Part 1: The Biological Foundation':
    - 'Chapter 1: Introduction to the Central Dogma': chapter-01.md
    - 'Chapter 2: The Genome and its Variations': chapter-02.md
    - 'Chapter 3: Proteins - The Functional Units': chapter-03.md
  - 'Part 2: Foundational Computational Skills':
    - 'Chapter 4: Command Line for Biologists': chapter-04.md
    - 'Chapter 5: Python for Bioinformatics': chapter-05.md
    - 'Chapter 6: Navigating Biological Databases': chapter-06.md
    - 'Chapter 7: Statistics for Bioinformatics': chapter-19.md
  - 'Part 3: Core Bioinformatics Analysis':
    - 'Chapter 8: Sequence Alignment': chapter-07.md
    - 'Chapter 9: Phylogenetics': chapter-08.md
    - 'Chapter 10: Genome Assembly and Annotation': chapter-09.md
  - 'Part 4: High-Throughput "Omics"':
    - 'Chapter 11: Introduction to NGS': chapter-10.md
    - 'Chapter 12: Transcriptomics': chapter-11.md
    - 'Chapter 13: Proteomics and Metabolomics': chapter-12.md
    - 'Chapter 14: Microbiomics': chapter-13.md
  - 'Part 5: Advanced Topics and Applications':
    - 'Chapter 15: Structural Bioinformatics': chapter-14.md
    - 'Chapter 16: Systems Biology': chapter-15.md
    - 'Chapter 17: Bioinformatics in Medicine': chapter-16.md
    - 'Chapter 18: Integrated Clinical Proteomics: WGCNA Analysis': chapter-17.md
    - 'Chapter 19: Interactive Visualization of WGCNA Results': chapter-18.md
    - 'Chapter 20: Multiomics Data Integration': chapter-20.md
  - Glossary: GLOSSARY.md